<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>ОГЭ Подготовка — География</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #08101d;
      --panel: rgba(14, 20, 34, .92);
      --panel-2: rgba(18, 25, 42, .92);
      --card: rgba(255,255,255,.06);
      --card-2: rgba(255,255,255,.085);
      --border: rgba(148,163,184,.18);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --good: #22c55e;
      --bad: #ef4444;
      --accent: #60a5fa;
      --accent-2: #a78bfa;
      --shadow: 0 20px 60px rgba(0,0,0,.34);
      --radius: 22px;
      --max: 1080px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(900px 500px at 15% 0%, rgba(96,165,250,.16), transparent 55%),
        radial-gradient(800px 500px at 90% 10%, rgba(167,139,250,.13), transparent 45%),
        linear-gradient(180deg, #050816 0%, #08101d 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 14px 12px 18px;
    }

    .shell {
      width: 100%;
      max-width: var(--max);
      display: grid;
      gap: 14px;
    }

    .topbar, .panel {
      background: rgba(2, 6, 23, .42);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-badge {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 30px rgba(96,165,250,.20);
      flex: 0 0 auto;
      font-size: 22px;
    }

    .brand-text { min-width: 0; }
    .brand-title {
      margin: 0;
      font-weight: 900;
      font-size: 18px;
      line-height: 1.05;
      letter-spacing: -.02em;
    }
    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .level-badge, .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      cursor: pointer;
      border-radius: 14px;
      padding: 11px 14px;
      color: var(--text);
      background: rgba(255,255,255,.08);
      font-weight: 800;
      transition: transform .14s ease, background .14s ease, opacity .14s ease, box-shadow .14s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { background: rgba(255,255,255,.12); }
    .btn:active { transform: translateY(1px); }
    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 34px rgba(96,165,250,.22);
    }
    .btn.success {
      background: rgba(34,197,94,.13);
      box-shadow: inset 0 0 0 1px rgba(34,197,94,.24);
    }
    .btn.danger {
      background: rgba(239,68,68,.12);
      box-shadow: inset 0 0 0 1px rgba(239,68,68,.22);
    }
    .btn.ghost {
      background: transparent;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.11);
    }
    .btn.small {
      padding: 9px 11px;
      font-size: 13px;
      border-radius: 12px;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .content { display: grid; gap: 14px; }

    .view { display: none; }
    .view.active { display: block; animation: fade .18s ease; }
    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .panel { padding: 16px; }

    .hero {
      display: grid;
      gap: 14px;
      background: linear-gradient(135deg, rgba(96,165,250,.13), rgba(167,139,250,.10));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 18px;
    }

    .hero-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .h1, .h2, .section-title {
      margin: 0;
      line-height: 1.08;
      letter-spacing: -.02em;
    }
    .h1 { font-size: clamp(24px, 3.8vw, 34px); font-weight: 900; }
    .h2 { font-size: 22px; font-weight: 900; }
    .section-title { font-size: 18px; font-weight: 900; }

    .lead, .muted { margin: 0; color: var(--muted); line-height: 1.5; }
    .lead { max-width: 880px; color: #cbd5e1; }

    .chips, .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.06);
      color: #dbeafe;
      font-size: 12px;
      font-weight: 800;
    }

    .progress-block { display: grid; gap: 10px; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--muted);
    }
    .progress-bar {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255,255,255,.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--good), #22d3ee);
      transition: width .24s ease;
    }

    .grid { display: grid; gap: 14px; }
    .grid.subjects { grid-template-columns: repeat(12, minmax(0, 1fr)); }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .card:hover { background: var(--card-2); }

    .subject-card {
      grid-column: span 12;
      cursor: pointer;
      display: grid;
      gap: 12px;
      min-height: 176px;
      transition: transform .14s ease, background .14s ease, border-color .14s ease;
      border-color: rgba(96,165,250,.18);
    }
    .subject-card:hover { transform: translateY(-1px); }

    .subject-top {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .subject-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
      font-size: 24px;
      flex: 0 0 auto;
    }
    .subject-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }
    .subject-desc {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }
    .subject-footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .menu-card {
      background: var(--panel-2);
      border-radius: 20px;
      padding: 6px 4px;
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: transform .14s ease, background .14s ease;
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
    }
    .menu-item:hover { background: rgba(255,255,255,.07); transform: translateX(2px); }
    .menu-divider {
      height: 1px;
      background: rgba(255,255,255,.06);
      margin: 2px 12px;
    }
    .menu-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 20px;
      flex: 0 0 auto;
    }
    .menu-icon.theory { background: rgba(124,58,237,.18); color: #c4b5fd; }
    .menu-icon.practice { background: rgba(6,214,160,.16); color: #5eead4; }
    .menu-icon.maps { background: rgba(59,130,246,.16); color: #93c5fd; }
    .menu-icon.exam { background: rgba(245,158,11,.16); color: #fbbf24; }
    .menu-icon.stats { background: rgba(244,63,94,.14); color: #fb7185; }
    .menu-icon.ai { background: rgba(168,85,247,.16); color: #ddd6fe; }
    .menu-label { flex: 1; min-width: 0; }
    .menu-label .title { color: #fff; font-size: 14px; }
    .menu-label .sub { color: var(--muted); font-size: 11px; margin-top: 2px; font-weight: 600; }
    .menu-arrow { color: rgba(255,255,255,.32); font-size: 18px; }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .breadcrumbs button {
      border: 0;
      background: transparent;
      color: #cbd5e1;
      padding: 0;
      cursor: pointer;
      font-weight: 800;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.12fr .88fr;
      gap: 14px;
    }

    .quiz-box { display: grid; gap: 14px; align-content: start; }
    .quiz-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .quiz-progress { font-size: 13px; color: var(--muted); }
    .question-card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 20px;
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .question-text {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      line-height: 1.35;
    }
    .answer-grid { display: grid; gap: 10px; }
    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 14px 15px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: var(--text);
      cursor: pointer;
      font-weight: 800;
      line-height: 1.35;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .answer-btn:hover { background: rgba(255,255,255,.1); transform: translateY(-1px); }
    .answer-btn.correct { background: rgba(34,197,94,.16); border-color: rgba(34,197,94,.42); }
    .answer-btn.wrong { background: rgba(239,68,68,.16); border-color: rgba(239,68,68,.42); }

    .feedback {
      min-height: 88px;
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      line-height: 1.52;
      color: #dbeafe;
    }
    .feedback.good { border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.10); }
    .feedback.bad { border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.10); }

    .topics-list, .history-list { display: grid; gap: 10px; }
    .topic-item, .history-item {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 13px 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .topic-name { margin: 0; font-weight: 900; }
    .topic-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .stat {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 14px;
    }
    .stat-value {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
    }
    .stat-label { margin: 4px 0 0; font-size: 12px; color: var(--muted); }

    .bubble {
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.55;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }
    .bubble.bot {
      background: var(--panel-2);
      border-bottom-left-radius: 6px;
    }
    .bubble.hint {
      background: rgba(6,214,160,.08);
      border-color: rgba(6,214,160,.16);
      color: #d1fae5;
    }

    .footer-note { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .empty { color: var(--muted); line-height: 1.5; font-size: 14px; }

    .bottom-nav {
      background: rgba(2, 6, 23, .66);
      backdrop-filter: blur(16px);
      padding: 10px 12px;
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      color: #5a6a80;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      padding: 4px 8px;
      min-width: 56px;
      user-select: none;
    }
    .nav-item.active { color: #79c0ff; }
    .nav-item span:first-child { font-size: 18px; }

    textarea.ai-input {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: var(--text);
      padding: 14px;
      font: inherit;
      outline: none;
      line-height: 1.5;
    }
    textarea.ai-input:focus {
      border-color: rgba(96,165,250,.45);
      box-shadow: 0 0 0 3px rgba(96,165,250,.12);
    }

    .ai-output {
      white-space: normal;
      word-break: break-word;
    }

    .mini-kpi {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    @media (max-width: 900px) {
      .grid.subjects, .two-col { grid-template-columns: 1fr; }
      .subject-card { grid-column: span 12; }
    }
    @media (max-width: 560px) {
      .app { padding: 10px 8px 14px; }
      .panel, .topbar { padding: 14px; }
      .brand-title { font-size: 17px; }
      .h1 { font-size: 23px; }
      .h2 { font-size: 20px; }
      .question-text { font-size: 17px; }
      .subject-card { min-height: auto; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .bottom-nav {
        padding: 8px;
        gap: 4px;
      }
      .nav-item {
        min-width: 0;
        flex: 1 1 0;
      }
    }
  </style>
</head>

    function startQuiz(mode = "practice", topic = null) {
      const subject = getCurrentSubject();
      let pool = subject.questions.slice();

      if (topic) pool = pool.filter(q => q.topic === topic);
      if (!pool.length) pool = subject.questions.slice();

      if (mode === "practice") {
        pool = shuffle(pool.slice()).slice(0, Math.min(5, pool.length));
      } else if (mode === "blitz") {
        pool = shuffle(pool.slice()).slice(0, Math.min(5, pool.length));
      } else if (mode === "exam") {
        pool = shuffle(pool.slice()).slice(0, Math.min(10, pool.length));
      } else if (mode === "errors") {
        const p = ensureSubjectProgress(subject.id);
        const wrongQuestions = (p.history || [])
          .filter(x => !x.isCorrect)
          .map(x => subject.questions.find(q => q.q === x.q))
          .filter(Boolean);
        pool = wrongQuestions.length ? shuffle(wrongQuestions.slice()).slice(0, Math.min(5, wrongQuestions.length)) : shuffle(subject.questions.slice()).slice(0, Math.min(5, subject.questions.length));
      }

      state.currentQuizMode = mode;
      state.currentQuizTopic = topic;
      state.currentQuizPool = pool;
      state.currentQuizIndex = 0;
      state.quizAnswered = false;
      state.quizSelected = null;
      clearQuizTimer();

      if (mode === "exam") startQuizTimer(20 * 60);
      if (mode === "blitz") startQuizTimer(5 * 60);

      switchScreen("quiz");

    function checkAnswer(answer) {
      if (state.quizAnswered) return;

      const subject = getCurrentSubject();
      const question = state.currentQuizPool[state.currentQuizIndex];
      const isCorrect = answer === question.answer;
      const p = ensureSubjectProgress(subject.id);

      state.quizAnswered = true;
      state.quizSelected = answer;

      if (isCorrect) {
        p.correct += 1;
        p.streak = (p.streak || 0) + 1;
        p.bestStreak = Math.max(p.bestStreak || 0, p.streak);
      } else {
        p.wrong += 1;
        p.streak = 0;
      }

      p.solved += 1;
      p.lastPractice = new Date().toLocaleString("ru-RU");

      const topic = question.topic || "Без темы";
      if (!p.byTopic[topic]) p.byTopic[topic] = { solved: 0, correct: 0, wrong: 0 };
      p.byTopic[topic].solved += 1;
      if (isCorrect) p.byTopic[topic].correct += 1;
      else p.byTopic[topic].wrong += 1;

      p.history.unshift({
        q: question.q,
        selected: answer,
        correct: question.answer,
        topic,
        isCorrect,
        ts: new Date().toLocaleString("ru-RU")
      });
      p.history = p.history.slice(0, 12);
      saveProgress();

      renderScreen("quiz");
    }

    function renderQuiz() {
      const subject = getCurrentSubject();
      const question = state.currentQuizPool[state.currentQuizIndex];
      if (!question) {
        return `
          <div class="panel">
            <div class="empty">Вопросов нет. Вернись назад и выбери другой режим.</div>
          </div>
        `;
      }

      const isLast = state.currentQuizIndex >= state.currentQuizPool.length - 1;
      const p = ensureSubjectProgress(subject.id);
      const score = `${p.correct} / ${p.correct + p.wrong}`;

      const buttons = question.options.map(opt => {
        const selected = state.quizSelected === opt;
        const isCorrect = opt === question.answer;
        const classes = [
          "answer-btn",
          state.quizAnswered && isCorrect ? "correct" : "",
          state.quizAnswered && selected && !isCorrect ? "wrong" : ""
        ].filter(Boolean).join(" ");

        return `<button class="${classes}" ${state.quizAnswered ? "disabled" : ""} onclick="checkAnswer(${JSON.stringify(opt)})">${escapeHtml(opt)}</button>`;
      }).join("");

      const feedback = !state.quizAnswered
        ? `<div class="feedback">Выбери ответ, чтобы увидеть проверку и объяснение.</div>`
        : (() => {
            const correct = state.quizSelected === question.answer;
            const aiPrompt = `Разбери мою ошибку по географии ОГЭ.
Вопрос: ${question.q}
Мой ответ: ${state.quizSelected}
Правильный ответ: ${question.answer}
Объясни простыми словами, укажи, где ошибка, и дай короткую запоминалку.`;
            return correct
              ? `<div class="feedback good"><b>✅ Верно.</b><br>${escapeHtml(question.explanation)}</div>`
              : `
                <div class="feedback bad">
                  <b>❌ Неверно.</b><br>
                  Твой ответ: <b>${escapeHtml(state.quizSelected)}</b><br>
                  Правильный ответ: <b>${escapeHtml(question.answer)}</b><br><br>
                  ${escapeHtml(question.explanation)}
                  <div style="margin-top:12px;">
                    <button class="btn small primary" onclick='openAiWithPrompt(${JSON.stringify(aiPrompt)})'>🤖 Разобрать с AI</button>
                  </div>
                </div>
              `;
          })();

      const timerChip = state.timerSeconds > 0 ? `<span class="chip" id="quizTimerChip"></span>` : "";
      const nextLabel = isLast ? "Завершить" : "Следующий вопрос";

      return `
        <div class="breadcrumbs">
          <button onclick="goHome()">Главная</button>
          <span>›</span>
          <button onclick="showSubject('${subject.id}')">${subject.shortTitle}</button>
          <span>›</span>
          <span>Тренировка</span>
        </div>

        <div class="two-col" style="margin-top:12px;">
          <div class="panel quiz-box">
            <div class="quiz-top">
              <div>
                <div class="section-title" style="font-size:18px;">${subject.shortTitle}: тренировка</div>
                <div class="quiz-progress">Вопрос ${state.currentQuizIndex + 1} из ${state.currentQuizPool.length}</div>
              </div>
              <div class="chip-row">
                <span class="chip" id="quizScoreChip">${score}</span>
                <span class="chip" id="quizTopicChip">Тема: ${state.currentQuizTopic || "смешанная"}</span>
                ${timerChip}
              </div>
            </div>

            <div class="question-card">
              <p class="question-text">${escapeHtml(question.q)}</p>
              <div class="answer-grid">
                ${buttons}
              </div>
            </div>

            ${feedback}

            <div class="chips">
              <button class="btn" id="btnNext" onclick="nextQuestion()" ${!state.quizAnswered ? "disabled" : ""}>${nextLabel}</button>
              <button class="btn success" id="btnFinish" onclick="finishQuiz(false)" ${!state.quizAnswered ? "disabled" : ""}>Завершить тренировку</button>
              <button class="btn danger" onclick="startQuiz(state.currentQuizMode || 'practice', state.currentQuizTopic)">Начать заново</button>
            </div>
          </div>

          <div class="grid" style="gap:14px; align-content:start;">
            <div class="panel">
              <div class="section-title">Подсказка</div>
              <div class="empty" style="margin-top:10px;">
                После ответа ты сразу видишь результат и объяснение.
                Потом это можно заменять AI-разбором без изменения интерфейса.
              </div>
            </div>

            <div class="panel">
              <div class="section-title">Что улучшим позже</div>
              <div class="empty" style="margin-top:10px;">
                • генерация новых вопросов<br>
                • объяснение ошибок AI<br>
                • подбор слабых тем<br>
                • ежедневный план подготовки
              </div>
            </div>
          </div>
        </div>
      `;
    }
