<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>ГеоПро — Подготовка к ОГЭ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:#0d1117;
  --card:#161b22;
  --card2:#1c2333;
  --primary:#58a6ff;
  --primary2:#3fb950;
  --text:#f0f6fc;
  --muted:#8b949e;
  --danger:#f85149;
  --gold:#d29922;
  --border:#ffffff0c;
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Segoe UI',system-ui,-apple-system,BlinkMacSystemFont,'Roboto',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 15% 15%, #58a6ff14 0%, transparent 50%),radial-gradient(circle at 85% 85%, #3fb95010 0%, transparent 50%);pointer-events:none;z-index:0;}
.screen{display:none;flex-direction:column;min-height:100vh;position:relative;z-index:1;}
.screen.active{display:flex;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.topbar{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;background:#0f1620;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
.topbar .left{display:flex;align-items:center;gap:10px;min-width:0;}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.username{font-size:13px;font-weight:700;}
.sublabel{font-size:10px;color:var(--muted);}
.badge{background:#f8514915;color:#f85149;font-weight:700;font-size:12px;padding:6px 12px;border-radius:20px;white-space:nowrap;}
.scroll{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:92px;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:8px;}
.panel,.card{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);}
.panel{padding:16px;}
.xp-panel{background:var(--card2);padding:14px 16px;display:flex;align-items:center;gap:12px;border-radius:var(--radius);}
.xp-icon{font-size:26px;flex-shrink:0;}
.xp-bar{height:6px;background:#2d3a55;border-radius:8px;margin:6px 0;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2));border-radius:8px;width:0%;}
.xp-stats{font-size:11px;color:var(--muted);}
.xp-title{font-weight:600;font-size:14px;}
.actions{display:flex;gap:10px;}
.btn{flex:1;padding:14px 8px;border-radius:var(--radius);background:var(--card2);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text);font-weight:600;font-size:12px;cursor:pointer;transition:transform .15s, background .15s;user-select:none;}
.btn:hover{background:#232c3f;}
.btn:active{transform:scale(.97);}
.btn.primary{background:linear-gradient(135deg,var(--primary),#3b8fd9);border:none;box-shadow:0 6px 18px #58a6ff25;}
.btn.accent{background:linear-gradient(135deg,var(--primary2),#2d8a3e);border:none;box-shadow:0 6px 18px #3fb95025;}
.btn-icon{font-size:24px;}
.sec-title{font-size:14px;font-weight:700;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid-item{background:var(--card2);border-radius:var(--radius);padding:14px;border:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;color:#c0c8d0;font-size:12px;font-weight:500;text-align:center;}
.grid-item:active{background:#253544;}
.back-link{color:var(--primary);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.topic-list{display:flex;flex-direction:column;gap:8px;}
.topic-item{background:var(--card2);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--border);cursor:pointer;font-size:13px;color:#c0c8d0;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.topic-item:active{background:#253544;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 22px;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:500;cursor:pointer;user-select:none;}
.nav-item.active{color:var(--primary);}
.nav-icon{font-size:20px;}
.ai-panel{background:linear-gradient(135deg,#0f1e35,#0d1f2d);border:1px solid #58a6ff30;border-radius:var(--radius);overflow:hidden;}
.ai-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#58a6ff0a;border-bottom:1px solid #58a6ff20;cursor:pointer;}
.ai-header-left{display:flex;align-items:center;gap:10px;}
.ai-avatar{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:16px;}
.ai-name{font-size:13px;font-weight:700;color:var(--primary);}
.ai-tagline{font-size:10px;color:var(--muted);}
.ai-toggle{font-size:18px;color:var(--muted);transition:transform .3s;}
.ai-toggle.open{transform:rotate(180deg);}
.ai-body{padding:14px;display:none;flex-direction:column;gap:10px;}
.ai-body.open{display:flex;}
.ai-prompts{display:flex;flex-wrap:wrap;gap:6px;}
.ai-prompt-btn{background:#58a6ff15;border:1px solid #58a6ff30;border-radius:20px;padding:6px 12px;font-size:11px;color:var(--primary);cursor:pointer;}
.ai-messages{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;padding-right:4px;}
.msg{padding:10px 12px;border-radius:12px;font-size:13px;line-height:1.55;max-width:92%;word-break:break-word;}
.msg.user{background:#58a6ff20;border:1px solid #58a6ff30;align-self:flex-end;color:var(--text);}
.msg.ai{background:var(--card);border:1px solid var(--border);align-self:flex-start;color:#c8d8e8;}
.msg.loading{color:var(--muted);font-style:italic;}
.ai-input-row{display:flex;gap:8px;align-items:flex-end;}
.ai-input,.textarea{flex:1;background:var(--card);border:1px solid #58a6ff30;border-radius:12px;padding:10px 12px;color:var(--text);font-size:13px;resize:vertical;min-height:40px;max-height:110px;outline:none;}
.ai-input:focus,.textarea:focus{border-color:#58a6ff60;}
.ai-send{width:40px;height:40px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--primary),var(--primary2));border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ai-send:active{transform:scale(.93);}
.ai-send:disabled{opacity:.5;cursor:default;}
.ai-context{font-size:10px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 8px;}
.quiz-wrap{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:24px;overflow-y:auto;}
.q-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.q-progress{height:4px;background:var(--card2);border-radius:8px;overflow:hidden;flex:1;}
.q-progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary2));transition:width .4s ease;width:0%;}
.q-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.q-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--primary);margin-bottom:10px;}
.q-text{font-size:15px;line-height:1.55;font-weight:500;}
.answers{display:flex;flex-direction:column;gap:8px;}
.ans-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;color:var(--text);text-align:left;width:100%;}
.ans-btn:active{transform:scale(.98);}
.ans-btn.correct{border-color:var(--primary2);background:rgba(63,185,80,.1);}
.ans-btn.wrong{border-color:var(--danger);background:rgba(248,81,73,.1);}
.ans-letter{width:26px;height:26px;border-radius:8px;background:#2a3a55;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.ans-btn.correct .ans-letter{background:var(--primary2);}
.ans-btn.wrong .ans-letter{background:var(--danger);}
.btn-next{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:var(--radius);padding:16px;font-size:13px;font-weight:700;cursor:pointer;display:none;margin-top:4px;}
.btn-next.show{display:block;}
.btn-next:active{transform:scale(.97);}
.result-wrap{flex:1;padding:40px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;overflow-y:auto;padding-bottom:32px;}
.result-emoji{font-size:64px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.result-title{font-size:22px;font-weight:800;letter-spacing:-.02em;}
.result-sub{font-size:14px;color:var(--muted);}
.ring-wrap{position:relative;width:130px;height:130px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--card2);stroke-width:10;}
.ring-fill{fill:none;stroke:url(#rg);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-size:28px;font-weight:800;}
.ring-denom{font-size:12px;color:var(--muted);}
.res-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;}
.res-stat{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;}
.res-num{font-size:18px;font-weight:800;}
.res-num.g{color:var(--primary2)} .res-num.r{color:var(--danger)} .res-num.y{color:var(--gold)}
.res-label{font-size:10px;color:var(--muted);margin-top:3px;}
.res-btns{width:100%;display:flex;flex-direction:column;gap:8px;}
.btn-full{width:100%;padding:16px;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;}
.btn-full:active{transform:scale(.97);}
.btn-full.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;}
.btn-full.sec{background:transparent;color:var(--muted);border:1px solid var(--border);}
.lead{color:#cbd5e1;line-height:1.55;font-size:14px;}
.hero{background:linear-gradient(135deg,rgba(88,166,255,.11),rgba(63,185,80,.08));border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:18px;display:grid;gap:12px;}
.hero-row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);color:#dbeafe;font-size:12px;font-weight:800;}
.progress-block{display:grid;gap:10px;}
.progress-meta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted);}
.progress-bar{height:12px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08);}
.progress-fill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,var(--primary2),#22d3ee);transition:width .24s ease;}
.section-block{display:grid;gap:14px;}
.module-card{cursor:pointer;}
.module-title{font-weight:800;font-size:15px;}
.module-sub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.45;}
.small-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.small-btn{border:none;border-radius:12px;padding:10px 12px;background:#253347;color:var(--text);font-size:12px;font-weight:700;cursor:pointer;}
.small-btn.primary{background:linear-gradient(135deg,var(--primary),#3b8fd9);}
.small-btn.alt{background:linear-gradient(135deg,var(--primary2),#2d8a3e);}
.feedback{min-height:88px;border-radius:18px;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);line-height:1.52;color:#dbeafe;}
.feedback.good{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.10);}
.feedback.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10);}
.feedback.warn{border-color:#f5a62335;background:#f5a62310;color:#e8d0a0;}
.map-box{background:#0f1620;border:1px solid var(--border);border-radius:16px;padding:8px;}
.map-box svg{width:100%;height:auto;display:block;}
.empty{color:var(--muted);line-height:1.5;font-size:14px;}
@media (max-width:900px){.grid,.grid-3{grid-template-columns:1fr;}}
@media (max-width:560px){.scroll{padding:12px;padding-bottom:90px;}.topbar{padding:14px;}}
</style>
</head>
<body>

  <div class="topbar">
    <div class="left">
      <div class="avatar">🌍</div>
      <div>

<div class="screen" id="s-practice">
  <div class="topbar"><span class="back-link" onclick="goHome()">← Назад</span><div class="sec-title">🧠 Практика</div><div style="width:60px"></div></div>
  <div class="scroll" id="practice-scroll"></div>
</div>

<div class="screen" id="s-maps">
  <div class="topbar"><span class="back-link" onclick="goHome()">← Назад</span><div class="sec-title">🗺️ Карты</div><div style="width:60px"></div></div>
  <div class="scroll" id="maps-scroll"></div>
</div>

<div class="screen" id="s-ai">
  <div class="topbar"><span class="back-link" onclick="goHome()">← Назад</span><div class="sec-title">🤖 AI-тьютор</div><div style="width:60px"></div></div>
  <div class="scroll" id="ai-scroll"></div>
</div>

<div class="screen" id="s-stats">
  <div class="topbar"><span class="back-link" onclick="goHome()">← Назад</span><div class="sec-title">📊 Прогресс</div><div style="width:60px"></div></div>
  <div class="scroll" id="stats-scroll"></div>
</div>

<div class="screen" id="s-exam">
  <div class="topbar"><span class="back-link" onclick="goHome()">← Назад</span><div class="sec-title">🎯 Пробник</div><div style="width:60px"></div></div>

  <div class="topbar">
    <span class="back-link" onclick="goHome()">← Выйти</span>

  <div class="result-wrap" id="result-wrap"></div>

<script>
// ==================== ДАННЫЕ ====================
const DATA = {
  theory_sections: [
    { id: 'nature', title: '🌿 Природа России', topics: ['Рельеф', 'Климат', 'Внутренние воды', 'Почвы', 'Природные зоны'] },
    { id: 'population', title: '👥 Население России', topics: ['Численность', 'Размещение', 'Миграции', 'Города', 'Национальный состав'] },
    { id: 'economy', title: '🏭 Хозяйство России', topics: ['ТЭК', 'Машиностроение', 'Сельское хозяйство', 'Транспорт'] },
    { id: 'regions', title: '🗺️ Регионы России', topics: ['Европейский Север', 'Центральная Россия', 'Урал', 'Сибирь', 'Дальний Восток'] },
    { id: 'world', title: '🌐 Страны мира', topics: ['География стран', 'Население мира', 'Мировое хозяйство'] }
  ],
  facts: [
    { module: 'nature', topic: 'Рельеф', term: 'Уральские горы', definition: 'Горы, разделяющие Европу и Азию, протяжённость более 2000 км', prompt: 'Какие горы разделяют Европу и Азию?', explanation: 'Уральские горы — естественная граница между частями света', hint: 'Вспомни границу между Европой и Азией', openPrompt: 'Опишите особенности Уральских гор как границы между Европой и Азией', openAnswer: 'Уральские горы протянулись с севера на юг более чем на 2000 км и являются условной границей между Европой и Азией. Горы невысокие, богаты полезными ископаемыми.' },
    { module: 'nature', topic: 'Климат', term: 'Муссон', definition: 'Ветер, меняющий направление два раза в год', prompt: 'Как называется ветер, который меняет направление по сезонам?', explanation: 'Муссоны характерны для Дальнего Востока России', hint: 'Этот ветер приносит летом дожди, зимой — сухость', openPrompt: 'Объясните влияние муссонов на климат Дальнего Востока', openAnswer: 'Летом муссон приносит влагу с океана — много осадков и тайфуны. Зимой ветер дует с материка — сухо и морозно.' },
    { module: 'population', topic: 'Численность', term: 'Урбанизация', definition: 'Рост городов и городского населения', prompt: 'Как называется процесс роста городского населения?', explanation: 'В России урбанизация превышает 70%', hint: 'Связано с переездом людей в города', openPrompt: 'Назовите причины и последствия урбанизации в России', openAnswer: 'Причины: развитие промышленности, лучшие условия жизни. Последствия: экологические проблемы, транспортные заторы, развитие инфраструктуры.' },

const STORAGE_KEY = 'geopro_progress_v3';
const PROXY = 'https://yandex-proxy.mixakuznetsov15.workers.dev';

let state = {
  screen: 'home',
  currentModule: null,
  currentTopic: null,
  questionBank: [],
  session: [],
  currentIndex: 0,
  currentQuestion: null,
  answered: false,
  selected: null,
  sessionTitle: '',
  sessionMode: 'practice',
  timerSeconds: 0,
  timerHandle: null,
  sessionStats: { correct: 0, wrong: 0, openCorrect: 0, total: 0 }
};

function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      return JSON.parse(raw);
    }
  } catch(e) {}
  return { xp: 0, level: 1, streak: 0, lastDate: '', totalAnswered: 0, totalCorrect: 0, totalWrong: 0, moduleStats: {}, topicStats: {}, history: [] };
}

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); } catch(e) {}
}

state.progress = loadProgress();

function updateStreak() {
  const today = new Date().toISOString().slice(0,10);
  if (state.progress.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (state.progress.lastDate === yesterday) state.progress.streak = (state.progress.streak || 0) + 1;
  else state.progress.streak = 1;
  state.progress.lastDate = today;
  saveProgress();
}

function calcLevel(xp) { return Math.max(1, Math.floor((xp || 0) / 200) + 1); }

function addXP(points) {
  state.progress.xp = (state.progress.xp || 0) + points;
  state.progress.level = calcLevel(state.progress.xp);
  saveProgress();
}

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function sample(arr, n) { return shuffle(arr).slice(0, n); }
function pickWrong(pool, right, n) { return shuffle(pool.filter(x => x !== right)).slice(0, n); }
function uniq(arr) { return [...new Set(arr)]; }
function normalize(s) { return String(s || '').toLowerCase().replace(/ё/g, 'е').replace(/[^a-zа-я0-9\s]/gi, ' ').replace(/\s+/g, ' ').trim(); }
function escapeHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function extractKeywords(text) {
  const stop = new Set(['это','так','как','что','для','или','если','тоже','еще','ещё','при','над','под','между']);
  return uniq(normalize(text).split(' ').filter(w => w.length > 4 && !stop.has(w)));
}

function scoreOpenAnswer(user, answer) {
  const u = normalize(user);
  const kws = extractKeywords(answer);
  if (!kws.length) return u.length > 0 ? 0.5 : 0;
  let hits = 0;
  kws.forEach(k => { if (u.includes(k)) hits += 1; });
  return hits / kws.length;
}

function getDayWord(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'день';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'дня';
  return 'дней';
}

function calcAccuracy(correct, wrong) {
  const total = (correct || 0) + (wrong || 0);
  return total ? Math.round((correct || 0) / total * 100) : 0;
}

function calcAccuracyForModule(moduleId) {
  const s = state.progress.moduleStats[moduleId];
  if (!s) return 0;
  return calcAccuracy(s.correct || 0, s.wrong || 0);
}

function moduleCount(moduleId) {
  return state.questionBank.filter(q => q.module === moduleId).length;
}

// ==================== ПОСТРОЕНИЕ БАНКА ВОПРОСОВ ====================
function buildQuestionBank() {
  const bank = [];
  DATA.facts.forEach((f, idx) => {
    let topic = f.topic;
    let moduleId = f.module;
    let termPool = DATA.facts.filter(x => x.module === moduleId).map(x => x.term).filter(x => x !== f.term);
    let defPool = DATA.facts.filter(x => x.module === moduleId).map(x => x.definition).filter(x => x !== f.definition);
    
    bank.push({
      id: `${moduleId}-${idx}-t`,
      type: 'mcq',
      module: moduleId,
      topic: topic,
      q: f.prompt,
      options: shuffle([f.term, ...pickWrong(termPool, f.term, 3)]),
      answer: f.term,
      explanation: f.explanation,
      hint: f.hint
    });
    
    bank.push({
      id: `${moduleId}-${idx}-d`,
      type: 'mcq',
      module: moduleId,
      topic: topic,
      q: `Что означает: ${f.term}?`,
      options: shuffle([f.definition, ...pickWrong(defPool, f.definition, 3)]),
      answer: f.definition,
      explanation: f.explanation,
      hint: f.hint
    });
    
    bank.push({
      id: `${moduleId}-${idx}-o`,
      type: 'open',
      module: moduleId,
      topic: topic,
      q: f.openPrompt,
      answer: f.openAnswer,
      explanation: f.explanation,
      hint: f.hint
    });
  });
  
  DATA.map_tasks.forEach((m, idx) => {
    bank.push({
      id: `map-${idx}`,
      type: 'map',
      module: 'maps',
      topic: m.topic,
      q: m.question,
      options: shuffle(m.options),
      answer: m.answer,
      explanation: m.explanation,
      hint: m.hint,
      svg: m.svg
    });
  });
  
  return shuffle(bank);
}

// ==================== СЕССИИ (ТРЕНИРОВКИ) ====================
function startSession(title, questions, mode, timerSeconds = 0) {
  state.sessionTitle = title;
  state.sessionMode = mode;
  state.session = shuffle([...questions]);
  state.currentIndex = 0;
  state.currentQuestion = state.session[0] || null;
  state.answered = false;
  state.selected = null;
  state.sessionStats = { correct: 0, wrong: 0, openCorrect: 0, total: state.session.length };
  stopTimer();
  if (timerSeconds > 0) startTimer(timerSeconds);
  switchScreen('quiz');
}

function startTimer(seconds) {
  state.timerSeconds = seconds;
  state.timerHandle = setInterval(() => {
    state.timerSeconds--;
    if (state.timerSeconds <= 0) {
      stopTimer();
      finishSession();
    } else {
      updateQuizHeader();
    }
  }, 1000);
}

function stopTimer() {
  if (state.timerHandle) clearInterval(state.timerHandle);
  state.timerHandle = null;
  state.timerSeconds = 0;
}

function updateQuizHeader() {
  const total = state.session.length;
  const idx = state.currentIndex + 1;
  const counter = document.getElementById('quiz-counter');
  if (counter) counter.textContent = state.timerSeconds > 0 ? formatTime(state.timerSeconds) : `${idx}/${total}`;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2,'0');
  const s = (sec % 60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

function startModulePractice(moduleId) {
  const sec = DATA.theory_sections.find(x => x.id === moduleId);
  const q = sample(state.questionBank.filter(item => item.module === moduleId), 10);
  startSession(`Практика: ${sec ? sec.title : moduleId}`, q, 'practice');
}

function startTopicPractice(moduleId, topic) {
  const q = sample(state.questionBank.filter(item => item.topic === topic), 8);
  startSession(`Тема: ${topic}`, q, 'practice');
}

function startMixedPractice() {

}

function startMapPractice() {
  const q = sample(state.questionBank.filter(item => item.type === 'map'), 6);
  startSession('Карты и схемы', q, 'maps');
}

function buildExamPaper() {
  const mcq = state.questionBank.filter(q => q.type === 'mcq');
  const map = state.questionBank.filter(q => q.type === 'map');
  const open = state.questionBank.filter(q => q.type === 'open');
  return shuffle([...sample(mcq, 8), ...sample(map, 3), ...sample(open, 4)]).slice(0, 15);
}

function startExam() {
  startSession('Пробник ОГЭ', buildExamPaper(), 'exam', 30 * 60);
}

function logAttempt(question, correct, userAnswer) {
  state.progress.totalAnswered = (state.progress.totalAnswered || 0) + 1;
  if (correct) state.progress.totalCorrect = (state.progress.totalCorrect || 0) + 1;
  else state.progress.totalWrong = (state.progress.totalWrong || 0) + 1;
  
  const mod = question.module || 'misc';
  if (!state.progress.moduleStats[mod]) state.progress.moduleStats[mod] = { answered: 0, correct: 0, wrong: 0 };
  state.progress.moduleStats[mod].answered++;
  if (correct) state.progress.moduleStats[mod].correct++;
  else state.progress.moduleStats[mod].wrong++;
  
  state.progress.history = state.progress.history || [];
  state.progress.history.unshift({
    ts: new Date().toLocaleString('ru-RU'),
    module: mod,
    topic: question.topic,
    q: question.q,
    correct: question.answer,
    user: userAnswer,
    ok: correct
  });
  state.progress.history = state.progress.history.slice(0, 20);
  saveProgress();
}

function answerMCQ(choice) {
  if (state.answered) return;
  state.answered = true;
  state.selected = choice;
  const q = state.currentQuestion;
  const ok = choice === q.answer;
  if (ok) state.sessionStats.correct++;
  else state.sessionStats.wrong++;
  logAttempt(q, ok, choice);
  addXP(ok ? 10 : 2);
  renderQuiz();
}

function submitOpenAnswer() {
  if (state.answered) return;
  const ta = document.getElementById('open-answer');
  const user = ta ? ta.value.trim() : '';
  if (!user) return;
  state.answered = true;
  state.selected = user;
  const q = state.currentQuestion;
  const score = scoreOpenAnswer(user, q.answer);
  const ok = score >= 0.4;
  if (ok) state.sessionStats.openCorrect++;
  else state.sessionStats.wrong++;
  logAttempt(q, ok, user);
  addXP(ok ? 12 : 3);
  renderQuiz();
}

function useHint() {
  const q = state.currentQuestion;
  const hintBox = document.getElementById('hint-box');
  if (!q || !hintBox) return;
  hintBox.style.display = 'block';
  hintBox.className = 'feedback warn';
  hintBox.textContent = q.hint || 'Подумай о ключевом признаке темы.';
}

function nextQuestion() {
  if (state.currentIndex < state.session.length - 1) {
    state.currentIndex++;
    state.currentQuestion = state.session[state.currentIndex];
    state.answered = false;
    state.selected = null;
    renderQuiz();
  } else {
    finishSession();
  }
}

function finishSession() {
  stopTimer();
  const total = state.session.length;
  const correct = (state.sessionStats.correct || 0) + (state.sessionStats.openCorrect || 0);
  const wrong = state.sessionStats.wrong || 0;
  const acc = Math.round(correct / total * 100);
  addXP(correct * 10 + (acc >= 80 ? 40 : 0));
  state.progress.level = calcLevel(state.progress.xp);
  saveProgress();
  state.resultData = { total, correct, wrong, acc, title: state.sessionTitle };
  switchScreen('result');
}

function renderQuiz() {
  const q = state.currentQuestion;
  if (!q) { document.getElementById('quiz-wrap').innerHTML = '<div class="empty">Нет вопросов</div>'; return; }
  const total = state.session.length;
  const idx = state.currentIndex + 1;
  updateQuizHeader();
  
  let html = `<div class="q-top"><div class="q-progress"><div class="q-progress-fill" style="width:${((idx-1)/total*100)}%"></div></div></div>
    <div class="q-card"><div class="q-tag">${q.type === 'open' ? 'Развёрнутый ответ' : q.type === 'map' ? 'Карты' : 'Задание'}</div>
    <div class="q-text">${escapeHtml(q.q)}</div></div>`;
  
  if (q.type === 'map' && q.svg) html += `<div class="map-box">${q.svg}</div>`;
  
  if (q.type === 'open') {
    html += `<div class="panel"><textarea id="open-answer" class="textarea" placeholder="Напиши ответ..."></textarea>
      <div class="small-actions"><button class="small-btn primary" onclick="submitOpenAnswer()">Проверить</button></div></div>`;
  } else {
    html += `<div class="answers">`;
    q.options.forEach((opt, i) => {
      const letters = ['А','Б','В','Г'];
      const cls = state.answered ? (opt === q.answer ? 'ans-btn correct' : (state.selected === opt ? 'ans-btn wrong' : 'ans-btn')) : 'ans-btn';
      html += `<button class="${cls}" ${state.answered ? 'disabled' : ''} onclick="answerMCQ(${JSON.stringify(opt)})"><div class="ans-letter">${letters[i]}</div><span>${escapeHtml(opt)}</span></button>`;
    });
    html += `</div><button onclick="useHint()" style="margin-top:12px;background:transparent;border:1px solid #f5a623;border-radius:14px;padding:10px;color:#f5a623;cursor:pointer;">💡 Подсказка</button>`;
  }
  
  if (state.answered) {
    const ok = q.type === 'open' ? scoreOpenAnswer(state.selected, q.answer) >= 0.4 : state.selected === q.answer;
    html += `<div id="hint-box" class="feedback ${ok ? 'good' : 'bad'}"><b>${ok ? '✅ Верно' : '❌ Неверно'}</b><br>${escapeHtml(q.explanation)}</div>`;
    html += `<button class="btn-next show" onclick="nextQuestion()">${idx < total ? 'Следующий вопрос →' : 'Завершить →'}</button>`;
  } else {
    html += `<div id="hint-box" class="feedback warn" style="display:none;"></div>`;
  }
  
  document.getElementById('quiz-wrap').innerHTML = html;
}

function renderResult() {
  const r = state.resultData || { total: 0, correct: 0, wrong: 0, acc: 0 };
  const bonus = r.correct * 20 + (r.acc >= 80 ? 40 : 0);
  const emoji = r.acc >= 80 ? '🏆' : r.acc >= 60 ? '👍' : '📖';
  const headline = r.acc >= 80 ? 'Отличный результат!' : r.acc >= 60 ? 'Неплохо' : 'Нужно повторить';
  
  document.getElementById('result-wrap').innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-title">${headline}</div>
    <div class="result-sub">${r.title || ''} · ${r.correct} из ${r.total} · ${r.acc}%</div>
    <div class="ring-wrap"><svg width="130" height="130" viewBox="0 0 130 130">
      <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#3fb950"/></linearGradient></defs>
      <circle class="ring-bg" cx="65" cy="65" r="54"></circle>
      <circle id="ring-fill" class="ring-fill" cx="65" cy="65" r="54" stroke-dasharray="339" stroke-dashoffset="339"></circle>
    </svg><div class="ring-text"><div class="ring-num">${r.correct}</div><div class="ring-denom">из ${r.total}</div></div></div>
    <div class="res-stats"><div class="res-stat"><div class="res-num g">${r.correct}</div><div class="res-label">Верно</div></div>
    <div class="res-stat"><div class="res-num r">${r.wrong}</div><div class="res-label">Ошибки</div></div>
    <div class="res-stat"><div class="res-num y">+${bonus}</div><div class="res-label">XP</div></div></div>
    <div class="res-btns"><button class="btn-full primary" onclick="goHome()">🏠 На главную</button>
    <button class="btn-full sec" onclick="startMixedPractice()">🔄 Ещё раз</button></div>
  `;
  
  setTimeout(() => {
    const ring = document.getElementById('ring-fill');
    if (ring) {
      const circumference = 2 * Math.PI * 54;
      const offset = circumference * (1 - r.correct / Math.max(1, r.total));
      ring.style.strokeDashoffset = offset;
    }
  }, 80);
}

function updateBadge() {
  const el = document.getElementById('streak-badge');
  if (el) el.textContent = `🔥 ${state.progress.streak || 0} ${getDayWord(state.progress.streak || 0)}`;
}

// ==================== AI ФУНКЦИИ ====================
async function sendAI() {
  const input = document.getElementById('ai-input');
  const output = document.getElementById('ai-output');
  if (!input || !output) return;
  const prompt = input.value.trim();
  if (!prompt) { output.textContent = 'Напиши вопрос!'; return; }
  output.textContent = 'Думаю...';
  try {
    const res = await fetch(PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: prompt, messages: [{ role: 'system', text: 'Ты педагог по географии для ОГЭ. Отвечай кратко, по делу.' }, { role: 'user', text: prompt }] })
    });
    const data = await res.json();
    const answer = data.answer || data.text || JSON.stringify(data);
    output.className = 'feedback good';
    output.innerHTML = escapeHtml(answer).replace(/\n/g,'<br>');
  } catch(e) {
    output.className = 'feedback bad';
    output.textContent = 'Ошибка связи с AI';
  }
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
function init() {
  state.questionBank = buildQuestionBank();
  updateStreak();
  renderHome();
  renderTheory();
  renderPractice();
  renderMaps();
  renderAI();
  renderStats();
  renderExam();
  
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => goScreen(el.dataset.nav));
  });
  
  try {
    if (window.Telegram?.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }
  } catch(e) {}
}

window.goHome = goHome;
window.goScreen = goScreen;
window.openModule = openModule;
window.startModulePractice = startModulePractice;
window.startTopicPractice = startTopicPractice;
window.startMixedPractice = startMixedPractice;
window.startMapPractice = startMapPractice;
window.startExam = startExam;
window.answerMCQ = answerMCQ;
window.submitOpenAnswer = submitOpenAnswer;
window.nextQuestion = nextQuestion;
window.useHint = useHint;
window.sendAI = sendAI;

init();
</script>
