<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ГеоПро — Подготовка к ОГЭ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card2: #1c2333;
  --primary: #58a6ff;
  --primary2: #3fb950;
  --text: #f0f6fc;
  --muted: #8b949e;
  --danger: #f85149;
  --gold: #d29922;
  --border: #ffffff0c;
  --radius: 18px;
  --font-h: 'Unbounded', sans-serif;
  --font-b: 'Onest', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:var(--font-b); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(circle at 15% 15%, #58a6ff14 0%, transparent 50%),
              radial-gradient(circle at 85% 85%, #3fb95010 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

.screen { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }
.screen.active { display:flex; animation: fadeUp .3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.topbar {
  padding:16px 18px; display:flex; align-items:center; justify-content:space-between;
  background:#0f1620; border-bottom:1px solid var(--border); flex-shrink:0;
}
.avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:20px; }
.username { font-family:var(--font-h); font-size:13px; font-weight:700; }
.sublabel { font-size:10px; color:var(--muted); }
.streak { background:#f8514915; color:#f85149; font-weight:700; font-size:12px; padding:6px 12px; border-radius:20px; }

.scroll { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding-bottom:88px; }
.scroll::-webkit-scrollbar { width:3px; }
.scroll::-webkit-scrollbar-thumb { background:#ffffff15; border-radius:8px; }

/* ── Анимации появления карточек ── */
.card-animate {
  opacity: 0;
  transform: translateY(20px);
  animation: cardAppear 0.45s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
}
@keyframes cardAppear {
  to { opacity:1; transform:translateY(0); }
}

/* ── Кнопки ── */
.btn, .btn-full, .btn-next, .ans-btn, .continue-card, .modal-btn, button {
  transition: transform 0.12s ease, opacity 0.12s ease;
}
.btn:active, .btn-full:active, .btn-next:active, .ans-btn:active, .continue-card:active, .modal-btn:active, button:active {
  transform: scale(0.97) !important;
}

/* ── Прогресс-бары ── */
.path-progress-fill, .q-progress-fill {
  transition: width 0.8s cubic-bezier(0.2, 0.9, 0.3, 1);
}

/* ── Ежедневные задания: анимация выполнения ── */
.task-check {
  display: inline-block;
  transition: transform 0.25s ease, color 0.25s ease;
}
.task-check.done {
  color: var(--primary2) !important;
  animation: taskPop 0.35s ease;
}
@keyframes taskPop {
  0% { transform: scale(0.8); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* ── Toast ── */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.toast {
  background: rgba(28, 35, 51, 0.92);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  color: #fff;
  padding: 12px 20px;
  border-radius: 18px;
  font-weight: 600;
  font-size: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.3s forwards;
  pointer-events: auto;
  max-width: 90vw;
  text-align: center;
}
.toast.xp { border-left: 3px solid var(--primary2); }
.toast.chest { border-left: 3px solid var(--gold); }
.toast.achievement { border-left: 3px solid #c084fc; }
.toast.streak { border-left: 3px solid #f97316; }
@keyframes toastIn {
  from { opacity:0; transform:translateY(-16px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes toastOut {
  from { opacity:1; transform:translateY(0); }
  to { opacity:0; transform:translateY(-12px); }
}

/* ── AI PANEL (Профессор Гео) ── */
.ai-panel { background:linear-gradient(135deg,#0f1e35,#0d1f2d); border:1px solid #58a6ff30; border-radius:var(--radius); overflow:hidden; }
.ai-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:#58a6ff0a; border-bottom:1px solid #58a6ff20; cursor:pointer; }
.ai-header-left { display:flex; align-items:center; gap:10px; }
.ai-avatar { width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:16px; }
.ai-name { font-size:13px; font-weight:700; color:var(--primary); }
.ai-tagline { font-size:10px; color:var(--muted); }
.ai-toggle { font-size:18px; color:var(--muted); transition:transform .3s; }
.ai-toggle.open { transform:rotate(180deg); }

.ai-body { padding:14px; display:none; flex-direction:column; gap:10px; }
.ai-body.open { display:flex; animation: fadeUp .25s ease; }

.ai-prompts { display:flex; flex-wrap:wrap; gap:6px; }
.ai-prompt-btn { background:#58a6ff15; border:1px solid #58a6ff30; border-radius:20px; padding:6px 12px; font-size:11px; color:var(--primary); cursor:pointer; font-family:var(--font-b); transition:.15s; }
.ai-prompt-btn:active { background:#58a6ff30; }

.ai-messages { display:flex; flex-direction:column; gap:8px; max-height:220px; overflow-y:auto; padding-right:4px; }
.ai-messages::-webkit-scrollbar { width:2px; }
.ai-messages::-webkit-scrollbar-thumb { background:#ffffff15; }

.msg { padding:10px 12px; border-radius:12px; font-size:13px; line-height:1.55; max-width:92%; }
.msg.user { background:#58a6ff20; border:1px solid #58a6ff30; align-self:flex-end; color:var(--text); }
.msg.ai { background:var(--card); border:1px solid var(--border); align-self:flex-start; color:#c8d8e8; }
.msg.loading { color:var(--muted); font-style:italic; }

.ai-input-row { display:flex; gap:8px; align-items:flex-end; }
.ai-input { flex:1; background:var(--card); border:1px solid #58a6ff30; border-radius:12px; padding:10px 12px; color:var(--text); font-family:var(--font-b); font-size:13px; resize:none; min-height:40px; max-height:80px; outline:none; }
.ai-input:focus { border-color:#58a6ff60; }
.ai-input::placeholder { color:var(--muted); }
.ai-send { width:40px; height:40px; border-radius:12px; flex-shrink:0; background:linear-gradient(135deg,var(--primary),var(--primary2)); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .15s; }
.ai-send:active { transform:scale(.93); }
.ai-send:disabled { opacity:.5; cursor:default; }
.ai-context { font-size:10px; color:var(--muted); background:var(--card); border:1px solid var(--border); border-radius:8px; padding:4px 8px; }

/* ── QUIZ ── */
.quiz-wrap { flex:1; padding:16px; display:flex; flex-direction:column; gap:14px; padding-bottom:24px; overflow-y:auto; }
.quiz-wrap::-webkit-scrollbar { width:3px; }
.q-header { display:flex; justify-content:space-between; align-items:center; }
.q-progress { height:4px; background:var(--card2); border-radius:8px; overflow:hidden; }
.q-progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); transition:width .4s ease; }
.q-card { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
.q-tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--primary); margin-bottom:10px; }
.q-text { font-size:15px; line-height:1.55; font-weight:500; }
.answers { display:flex; flex-direction:column; gap:8px; }
.ans-btn { background:var(--card2); border:1.5px solid var(--border); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; font-family:var(--font-b); font-size:13px; color:var(--text); transition:.15s; }
.ans-btn:active { transform:scale(.98); }
.ans-btn.correct { border-color:var(--primary2); background:rgba(63,185,80,.1); }
.ans-btn.wrong { border-color:var(--danger); background:rgba(248,81,73,.1); }
.ans-letter { width:26px; height:26px; border-radius:8px; background:#2a3a55; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; transition:.15s; }
.ans-btn.correct .ans-letter { background:var(--primary2); }
.ans-btn.wrong .ans-letter { background:var(--danger); }
.btn-next { width:100%; background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; border:none; border-radius:var(--radius); padding:16px; font-family:var(--font-h); font-size:13px; font-weight:700; cursor:pointer; display:none; transition:transform .15s; margin-top:4px; }
.btn-next.show { display:block; animation: fadeUp .3s ease; }
.btn-next:active { transform:scale(.97); }

/* ── RESULT ── */
.result-wrap { flex:1; padding:40px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; overflow-y:auto; padding-bottom:32px; }
.result-emoji { font-size:64px; animation: popIn .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }
.result-title { font-family:var(--font-h); font-size:22px; font-weight:800; letter-spacing:-.02em; }
.result-sub { font-size:14px; color:var(--muted); }
.ring-wrap { position:relative; width:130px; height:130px; }
.ring-wrap svg { transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:var(--card2); stroke-width:10; }
.ring-fill { fill:none; stroke:url(#rg); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s ease; }
.ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-num { font-family:var(--font-h); font-size:28px; font-weight:800; }
.ring-denom { font-size:12px; color:var(--muted); }
.res-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; }
.res-stat { background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px 8px; text-align:center; }
.res-num { font-family:var(--font-h); font-size:18px; font-weight:800; }
.res-num.g{color:var(--primary2)} .res-num.r{color:var(--danger)} .res-num.y{color:var(--gold)}
.res-label { font-size:10px; color:var(--muted); margin-top:3px; }
.res-btns { width:100%; display:flex; flex-direction:column; gap:8px; }
.btn-full { width:100%; padding:16px; border-radius:var(--radius); font-family:var(--font-h); font-size:13px; font-weight:700; cursor:pointer; transition:.15s; }
.btn-full:active { transform:scale(.97); }
.btn-full.primary { background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; border:none; }
.btn-full.sec { background:transparent; color:var(--muted); border:1px solid var(--border); }

/* ── PATH (главный экран) ── */
.path-progress-card {
  background:var(--card2); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin-bottom:6px;
}
.path-progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.path-progress-label { font-size:13px; font-weight:600; }
.path-progress-pct { font-family:var(--font-h); font-size:16px; font-weight:800; color:var(--primary); }
.path-progress-bar { height:8px; background:#2d3a55; border-radius:8px; overflow:hidden; }
.path-progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); border-radius:8px; transition:width .5s ease; }

.continue-card {
  background:linear-gradient(135deg,#1a3a5c,#0f2438); border:1px solid #58a6ff40; border-radius:var(--radius);
  padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:transform .15s;
}
.continue-card:active { transform:scale(.98); }
.continue-icon { font-size:32px; flex-shrink:0; }
.continue-label { font-size:10px; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
.continue-title { font-size:15px; font-weight:700; margin-top:2px; }
.continue-arrow { font-size:20px; color:var(--primary); margin-left:auto; }

.path-node-row { display:flex; align-items:center; gap:14px; width:100%; }
.path-connector { width:3px; height:24px; margin:0 auto; }

.node-circle {
  width:56px; height:56px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:22px;
}
.node-circle.done { background:var(--primary2); border:2px solid var(--primary2); }
.node-circle.perfect { background:var(--gold); border:2px solid var(--gold); }
.node-circle.current { background:#f5a623; border:2px solid #f5a623; box-shadow:0 0 0 6px #f5a62320; animation: pulseNode 2s infinite; }
.node-circle.locked { background:var(--card2); border:2px solid var(--border); opacity:.4; }
@keyframes pulseNode { 0%,100%{box-shadow:0 0 0 6px #f5a62320} 50%{box-shadow:0 0 0 10px #f5a62308} }

.boss-node {
  width:72px; height:72px; border-radius:20px; flex-shrink:0;
  background:linear-gradient(135deg,#d29922,#b8860b); border:2px solid #d29922;
  display:flex; align-items:center; justify-content:center; font-size:30px;
}
.boss-node.locked { background:var(--card2); border-color:var(--border); opacity:.35; }

/* ── PROFILE ── */
.profile-header-card { display:flex; align-items:center; gap:16px; padding:8px 0 4px; }
.profile-avatar-big { width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
.profile-name-big { font-family:var(--font-h); font-size:17px; font-weight:800; }
.profile-level-big { font-size:12px; color:var(--primary); margin-top:3px; }

.profile-stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.profile-stat { background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px 6px; text-align:center; }
.profile-stat-num { font-family:var(--font-h); font-size:17px; font-weight:800; color:var(--primary); }
.profile-stat-label { font-size:9px; color:var(--muted); margin-top:3px; }

.badges-grid-profile { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.badge-item-p { background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px 6px; text-align:center; }
.badge-item-p.locked { opacity:.3; }
.badge-icon-p { font-size:22px; margin-bottom:4px; }
.badge-name-p { font-size:8px; color:var(--muted); line-height:1.3; }

.sub-status-card { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; align-items:center; gap:12px; }
.sub-status-card.active { border-color:#3fb95040; background:linear-gradient(135deg,#0f2318,#0d1f17); }

/* ── СУНДУКИ (анимации) ── */
@keyframes chestGlow {
  0% { box-shadow: 0 0 5px #d29922; }
  50% { box-shadow: 0 0 20px #d29922; }
  100% { box-shadow: 0 0 5px #d29922; }
}
@keyframes chestPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

/* ========== АНИМАЦИЯ ОТКРЫТИЯ СУНДУКА ========== */
.chest-open-anim {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px 0;
}
.chest-body {
  font-size: 64px;
  z-index: 2;
}
.chest-lid {
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
  width: 60px;
  height: 30px;
  background: linear-gradient(145deg, #d29922, #b8860b);
  border-radius: 10px 10px 0 0;
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
  transform-origin: bottom center;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 3;
}
.chest-lid.open {
  transform: translateX(-50%) rotate(-120deg);
}

.particle {
  position: absolute;
  top: 30px;
  left: 50%;
  width: 8px;
  height: 8px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  z-index: 1;
  animation: particleFly 0.8s ease-out forwards;
}
@keyframes particleFly {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(var(--x), var(--y)) scale(0);
  }
}

/* Модальное окно профессора (для подсказок) */
.professor-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  animation: fadeInOverlay 0.25s ease;
}
.professor-modal-card {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 32px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
}
@keyframes fadeInOverlay {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.professor-avatar {
  width: 64px; height: 64px; margin: 0 auto;
  background: transparent;
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px;
  overflow: hidden;
}
.professor-avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 24px;
}
.professor-message {
  font-size: 15px; line-height: 1.6; color: var(--text);
  padding: 0 8px;
}
.professor-actions {
  display: flex; flex-direction: column; gap: 10px; margin-top: 8px;
}
.professor-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  font-family: var(--font-h); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: transform 0.12s ease, background 0.2s ease;
  border: none;
}
.professor-btn:active { transform: scale(0.97); }
.professor-btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary2));
  color: #fff;
}
.professor-btn-secondary {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.professor-btn:disabled {
  opacity: 0.4;
  pointer-events: none;
}

/* ========== ВИДЖЕТ ПРОФЕССОРА С АНИМАЦИЯМИ ========== */
.prof-geo-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 950;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.prof-geo-btn {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background-color: #1e2a3a;
  background-image: url('https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_default.png');
  background-size: cover;
  background-position: center;
  border: 2px solid var(--gold);
  box-shadow: 0 0 12px rgba(210, 153, 34, 0.4), 0 4px 12px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease, background-image 0.2s ease;
  pointer-events: auto;
  will-change: transform;
  animation: subtlePulse 3s infinite ease-in-out, idleBreathing 4s infinite ease-in-out;
}
.prof-geo-btn:active {
  transform: scale(0.95);
  box-shadow: 0 0 18px rgba(210, 153, 34, 0.7), 0 2px 8px rgba(0,0,0,0.3);
}
@keyframes subtlePulse {
  0% { box-shadow: 0 0 8px rgba(210,153,34,0.3), 0 4px 12px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 0 16px rgba(210,153,34,0.6), 0 4px 12px rgba(0,0,0,0.3); }
  100% { box-shadow: 0 0 8px rgba(210,153,34,0.3), 0 4px 12px rgba(0,0,0,0.3); }
}
@keyframes idleBreathing {
  0%, 100% { transform: scale(1) translateY(0); }
  50% { transform: scale(1.03) translateY(-1px); }
}

.prof-geo-btn.talking {
  transform: translateY(-3px) rotate(-2deg);
  animation: none;
}

.prof-geo-btn.correct-bounce {
  animation: correctBounce 0.6s ease-out;
}
.prof-geo-btn.wrong-tilt {
  animation: wrongTilt 0.6s ease-out;
}
.prof-geo-btn.hint-explain {
  animation: hintExplain 0.8s ease-in-out;
}
.prof-geo-btn.chest-jump {
  animation: chestJump 0.7s ease-out;
}
.prof-geo-btn.levelup-glow {
  animation: levelUpGlow 0.8s ease-out;
}

@keyframes correctBounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.1) translateY(-8px); }
  60% { transform: scale(0.95) translateY(0); }
  100% { transform: scale(1); }
}
@keyframes wrongTilt {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(-6deg); }
  75% { transform: rotate(2deg); }
  100% { transform: rotate(0deg); }
}
@keyframes hintExplain {
  0% { transform: rotate(0deg); }
  25% { transform: rotate(-4deg); }
  75% { transform: rotate(4deg); }
  100% { transform: rotate(0deg); }
}
@keyframes chestJump {
  0% { transform: scale(1); }
  30% { transform: scale(1.15) translateY(-10px); }
  60% { transform: scale(0.95) translateY(0); }
  100% { transform: scale(1); }
}
@keyframes levelUpGlow {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.12); filter: brightness(1.3); }
  100% { transform: scale(1); filter: brightness(1); }
}

.prof-geo-speech {
  position: relative;

}

</style>

const PROF_IMAGES = {

// ========== ВИДЖЕТ ПРОФЕССОРА ==========
const ProfessorGeoWidget = {
  greetShownToday: false,
  timer: null,
  lastIndexes: {},
  currentEmotion: 'default',

  init() {
    const today = new Date().toISOString().slice(0,10);
    this.greetShownToday = (userProgress.professorGreetingDate === today);
    if (!this.greetShownToday) {
      setTimeout(() => this.showGreeting(), 1200);
      userProgress.professorGreetingDate = today;
      saveProgress();
    }
  },

  getRandomIndex(arr, type) {
    if (!this.lastIndexes[type]) this.lastIndexes[type] = -1;
    if (arr.length === 1) return 0;
    let idx = Math.floor(Math.random() * arr.length);
    if (arr.length > 1 && idx === this.lastIndexes[type]) {
      idx = (idx + 1) % arr.length;
    }
    this.lastIndexes[type] = idx;
    return idx;
  },

  setEmotion(type) {
    const btn = document.getElementById('prof-geo-btn');
    if (!btn) return;
    const img = PROF_IMAGES[type] || PROF_IMAGES.default;
    btn.style.backgroundImage = `url('${img}')`;
    this.currentEmotion = type;
  },

  resetEmotion() {
    this.setEmotion('default');
  },

  triggerAnimation(type) {
    const btn = document.getElementById('prof-geo-btn');
    if (!btn) return;
    const animClass = {
      correct: 'correct-bounce',
      wrong: 'wrong-tilt',
      hint: 'hint-explain',
      chest: 'chest-jump',
      levelup: 'levelup-glow',
      greeting: null
    }[type] || null;

    if (animClass) {
      btn.classList.add(animClass);
      setTimeout(() => {
        btn.classList.remove(animClass);
      }, 1000);
    }
  },

  showGreeting() {
    const arr = ProfessorMessages.greetingMessages;
    const idx = this.getRandomIndex(arr, 'greeting');
    this.showMessage(arr[idx], 5000, 'greeting');
  },

  showCorrectAnswer() {
    const arr = ProfessorMessages.correctAnswerMessages;
    const idx = this.getRandomIndex(arr, 'correct');
    this.showMessage(arr[idx], 3500, 'correct');
  },

  showWrongAnswer() {
    const arr = ProfessorMessages.wrongAnswerMessages;
    const idx = this.getRandomIndex(arr, 'wrong');
    this.showMessage(arr[idx], 4000, 'wrong');
  },

  showHint() {
    const arr = ProfessorMessages.hintMessages;
    const idx = this.getRandomIndex(arr, 'hint');
    this.showMessage(arr[idx], 4000, 'hint');
  },

  showLevelUp(level) {
    const arr = ProfessorMessages.levelUpMessages;
    const idx = this.getRandomIndex(arr, 'levelup');
    this.showMessage(arr[idx], 4000, 'levelup');
  },

  showStreak(streak) {
    const arr = ProfessorMessages.streakMessages;
    const idx = this.getRandomIndex(arr, 'streak');
    let msg = arr[idx].replace('{n}', streak);
    this.showMessage(msg, 4000, 'levelup');
  },

  showChest() {
    const arr = ProfessorMessages.chestMessages;
    const idx = this.getRandomIndex(arr, 'chest');
    this.showMessage(arr[idx], 4000, 'chest');
  },

  showFinishTopic() {
    const arr = ProfessorMessages.finishTopicMessages;
    const idx = this.getRandomIndex(arr, 'finish');
    this.showMessage(arr[idx], 4000, 'levelup');
  },

  showDailyTask() {
    const arr = ProfessorMessages.dailyTaskMessages;
    const idx = this.getRandomIndex(arr, 'daily');
    this.showMessage(arr[idx], 4000, 'levelup');
  },

  showMessage(text, duration = 4000, eventType = null) {
    const speechEl = document.getElementById('prof-geo-speech');
    const btn = document.getElementById('prof-geo-btn');
    if (!speechEl || !btn) return;

    this.hideSpeech();

    setTimeout(() => {
      if (eventType) {
        this.setEmotion(eventType);
        this.triggerAnimation(eventType);
      }
      btn.classList.add('talking');

      speechEl.innerHTML = text;
      speechEl.classList.add('visible');

      if (this.timer) clearTimeout(this.timer);
      this.timer = setTimeout(() => {
        speechEl.classList.remove('visible');
        btn.classList.remove('talking');
        this.resetEmotion();
      }, duration);
    }, 60);
  },

  hideSpeech() {
    const speechEl = document.getElementById('prof-geo-speech');
    const btn = document.getElementById('prof-geo-btn');
    if (speechEl) speechEl.classList.remove('visible');
    if (btn) btn.classList.remove('talking');
    if (this.timer) clearTimeout(this.timer);
  }
};

// ========== ДАННЫЕ И ИГРОВАЯ ЛОГИКА ==========
const PROXY = 'https://yandex-proxy.mixakuznetsov15.workers.dev';

  { key:'population', title:'👥 Население России', file:'questions_population.json', tasks:'Задания 23-25'},
  { key:'geopos', title:'📍 Геогр. положение России', file:'questions_geopos.json', tasks:'Задание 26' },

const HINTS_DB = {

function getProfessorHint(topicKey, level) {
  const hints = HINTS_DB[topicKey] || HINTS_DB['topo'];
  return hints[Math.min(level, hints.length - 1)];
}

var lessonsLoaded = [];

async function fetchJSON(filename) {
  var url = GITHUB_RAW + filename + '?nocache=' + Date.now();
  var r = await fetch(url);
  if (!r.ok) throw new Error('Ошибка загрузки: ' + filename);
  return await r.json();
}

async function loadAllLessons() {
  lessonsLoaded = [];
  for (var i = 0; i < QUESTIONS_FILES.length; i++) {
    var f = QUESTIONS_FILES[i];
    try {
      var data = await fetchJSON(f.file);
      var questions = [];
      if (Array.isArray(data)) {
        data.forEach(function(item) {
          if (item.tag && item.text && item.answers) questions.push(item);
        });
      }
      if (questions.length > 0) {
        lessonsLoaded.push({ title: f.title, tasks: f.tasks, questions: questions, key: f.key });
      }
    } catch(e) { console.warn('Не удалось загрузить', f.file, e); }
  }
  return lessonsLoaded;
}

function getAllLessons() {
  return lessonsLoaded.length > 0 ? lessonsLoaded : [];
}

const tgApp = window.Telegram?.WebApp;
const isTelegram = !!tgApp && typeof tgApp.initData !== 'undefined';
if (isTelegram) { tgApp.ready(); tgApp.expand(); }

function showToastMsg(text, type) {
  type = type || 'info';
  var container = document.getElementById('toast-container');
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = text;
  container.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, 2600);
}

function animateCards(container) {
  var cards = container.querySelectorAll('.path-progress-card, .continue-card, .profile-header-card, .profile-stats-grid > div, .badge-item-p, .sub-status-card, .profile-stat, .badges-grid-profile > div');
  cards.forEach(function(card, index) {
    card.classList.add('card-animate');
    card.style.animationDelay = (index * 0.05) + 's';
  });
}

var XPSystem = {
  addXP: function(amount, silent) {
    if (amount > 0) {
      if (userProgress.doubleXPUntil && new Date(userProgress.doubleXPUntil) > new Date()) amount *= 2;
      var oldLevel = userProgress.level;
      userProgress.xp += amount;
      userProgress.level = Math.floor(userProgress.xp / 200) + 1;
      saveProgress();
      if (!silent) showToastMsg('⚡ +' + amount + ' XP', 'xp');
      if (userProgress.level > oldLevel) ProfessorGeoWidget.showLevelUp(userProgress.level);
      AchievementSystem.check();
      DailyQuestSystem.incrementCounters(0, amount);
    }
  }
};

var DailyQuestSystem = {
  update: function() {
    var today = new Date().toISOString().slice(0,10);
    if (!userProgress.dailyTasksDate || userProgress.dailyTasksDate !== today) {
      userProgress.dailyTasksDate = today;
      userProgress.dailyTasks = { solve10: false, earn50XP: false, loginToday: true };
      userProgress.dailyTasksCollected = { solve10: false, earn50XP: false, loginToday: false };
      userProgress.allDailyTasksDone = false;
      saveProgress();
    }
    var tasks = userProgress.dailyTasks || {};
    var collected = userProgress.dailyTasksCollected || {};
    var dailyXP = (userProgress.dailyXP || 0);
    var dailyQuestions = (userProgress.dailyQuestions || 0);
    var somethingNewDone = false;
    if (dailyQuestions >= 10 && !tasks.solve10) {
      tasks.solve10 = true;
      if (!collected.solve10) { collected.solve10 = true; XPSystem.addXP(20); somethingNewDone = true; }
    }
    if (dailyXP >= 50 && !tasks.earn50XP) {
      tasks.earn50XP = true;
      if (!collected.earn50XP) { collected.earn50XP = true; XPSystem.addXP(20); somethingNewDone = true; }
    }
    if (!tasks.loginToday) { tasks.loginToday = true; if (!collected.loginToday) { collected.loginToday = true; XPSystem.addXP(20); somethingNewDone = true; } }
    if (tasks.solve10 && tasks.earn50XP && tasks.loginToday && !userProgress.allDailyTasksDone) {
      userProgress.allDailyTasksDone = true;
      XPSystem.addXP(100);
      ChestSystem.give('achievement');
    }
    if (somethingNewDone) ProfessorGeoWidget.showDailyTask();
    saveProgress();
  },
  incrementCounters: function(questionsCount, xpAmount) {
    var today = new Date().toISOString().slice(0,10);
    if (userProgress.dailyTasksDate !== today) { userProgress.dailyQuestions = 0; userProgress.dailyXP = 0; }
    userProgress.dailyQuestions = (userProgress.dailyQuestions || 0) + questionsCount;
    userProgress.dailyXP = (userProgress.dailyXP || 0) + xpAmount;
    saveProgress(); this.update();
  }
};

var AchievementSystem = {
  check: function() {
    if (!userProgress.achievements) userProgress.achievements = {};
    var now = new Date().toISOString();
    ACHIEVEMENTS_LIST.forEach(function(a) {
      if (userProgress.achievements[a.id] && userProgress.achievements[a.id].unlocked) return;
      var unlocked = a.cond();
      var progress = a.progress ? a.progress() : (unlocked ? (a.max || 1) : 0);
      if (!userProgress.achievements[a.id]) userProgress.achievements[a.id] = { progress: progress, unlocked: unlocked, date: unlocked ? now : null, chestGiven: false };
      else {
        userProgress.achievements[a.id].progress = progress;
        if (unlocked && !userProgress.achievements[a.id].unlocked) {
          userProgress.achievements[a.id].unlocked = true; userProgress.achievements[a.id].date = now;
          if (!userProgress.achievements[a.id].chestGiven) { ChestSystem.give('achievement'); userProgress.achievements[a.id].chestGiven = true; }
        }
      }
    });
    saveProgress();
  }
};

var ChestSystem = {
  isOpening: false,
  rewardPool: [
    { type: 'xp', value: 20, label: '+20 XP' },
    { type: 'xp', value: 50, label: '+50 XP' },
    { type: 'xp', value: 100, label: '+100 XP' },
    { type: 'boost_x2', duration: 15, label: 'Бустер x2 XP на 15 мин' },
    { type: 'free_hint', value: 1, label: 'Бесплатная подсказка' }
  ],
  give: function(type) {
    if (!userProgress.chests) userProgress.chests = [];
    userProgress.chests.push({ type: type || 'daily' });
    saveProgress();
  },
  giveDaily: function() {
    var today = new Date().toISOString().slice(0,10);
    if (userProgress.lastDailyChestDate === today) return;
    userProgress.lastDailyChestDate = today;
    this.give('daily');
  },
  giveStreak: function() {
    var streak = userProgress.streak || 0;
    var given = userProgress.streakChestsGiven || {};
    var thresholds = [3, 7, 14, 30];
    for (var i = 0; i < thresholds.length; i++) {
      var t = thresholds[i];
      if (streak >= t && !given[t]) {
        this.give('streak'); given[t] = true;
        ProfessorGeoWidget.showStreak(streak);
      }
    }
    userProgress.streakChestsGiven = given;
    saveProgress();
  },
  open: function() {
    if (this.isOpening) return;
    if (!userProgress.chests || userProgress.chests.length === 0) return;
    this.isOpening = true;
    var chest = userProgress.chests.shift();
    saveProgress();
    var self = this;
    // Временно отключаем toast-уведомления, чтобы награда была только в окне
    var originalToast = showToastMsg;
    showToastMsg = function() {};
    showChestOpeningAnimation(function() {
      var reward = self.getRandomReward();
      self.applyReward(reward, true); // silent
      self.showRewardModal(reward);
      self.isOpening = false;
      // Восстанавливаем toast
      showToastMsg = originalToast;
    });
  },
  getRandomReward: function() {
    var idx = Math.floor(Math.random() * this.rewardPool.length);
    return this.rewardPool[idx];
  },
  applyReward: function(reward, silent) {
    switch(reward.type) {
      case 'xp': XPSystem.addXP(reward.value, silent); break;
      case 'boost_x2':
        userProgress.doubleXPUntil = new Date(Date.now() + reward.duration * 60000).toISOString();
        saveProgress();
        break;
      case 'free_hint':
        userProgress.freeHints = (userProgress.freeHints || 0) + 1;
        saveProgress();
        break;
    }
  },
  showRewardModal: function(reward) {
    var container = document.getElementById('modal-container');
    container.innerHTML = `
      <div class="modal-overlay" id="reward-modal">
        <div class="modal-card" style="background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:24px; text-align:center;">
          <div style="font-size:42px; margin-bottom:16px;">🎉</div>
          <div style="font-size:22px; font-weight:800; margin-bottom:8px;">Поздравляем!</div>

          <button class="modal-btn" onclick="ChestSystem.closeRewardModal()" style="background:var(--primary); color:#fff; border:none; border-radius:var(--radius); padding:14px; font-family:var(--font-b); font-size:14px; font-weight:700; cursor:pointer; width:100%;">Продолжить</button>
        </div>
      </div>`;
  },
  closeRewardModal: function() {
    document.getElementById('modal-container').innerHTML = '';
    renderProfile();
  }
};

function showChestOpeningAnimation(callback) {
  var container = document.getElementById('modal-container');
  var particlesHtml = '';
  for (var i=0; i<12; i++) {
    var angle = (i/12)*Math.PI*2;
    var x = Math.cos(angle) * 40 + 'px';
    var y = Math.sin(angle) * 40 + 'px';
    particlesHtml += `<div class="particle" style="--x:${x}; --y:${y}; animation-delay:${i*0.03}s"></div>`;
  }
  container.innerHTML = `
    <div class="modal-overlay" id="chest-opening">
      <div class="modal-card" style="background:transparent; box-shadow:none; border:none; display:flex; align-items:center; justify-content:center;">
        <div class="chest-open-anim">
          <div class="chest-body">🎁</div>
          <div class="chest-lid" id="chestLid"></div>
          ${particlesHtml}
        </div>
      </div>
    </div>`;
  setTimeout(() => {
    var lid = document.getElementById('chestLid');
    if (lid) lid.classList.add('open');
  }, 300);
  setTimeout(() => {
    container.innerHTML = '';
    if (callback) callback();
  }, 1300);
}

var QuestionSystem = {
  curQ: 0, score: 0, answered: false, shuffled: [],
  curLesson: 0, lives: 3, hintUsed: false,
  lastExplainText: '', isBossMode: false,

  start: function(idx) {
    var all = getAllLessons();
    this.curLesson = idx; this.shuffled = all[idx].questions;
    this.curQ = 0; this.score = 0; this.answered = false;
    this.lives = 3; this.hintUsed = false; this.isBossMode = false;
    goScreen('s-quiz'); this.renderQ();
  },
  startBoss: function() {
    var all = getAllLessons();
    var allQuestions = [];
    all.forEach(l => { if (l.questions) allQuestions = allQuestions.concat(l.questions); });
    allQuestions = allQuestions.sort(() => Math.random()-0.5).slice(0, 30);
    this.isBossMode = true; this.shuffled = allQuestions; this.curLesson = -1;
    this.curQ = 0; this.score = 0; this.answered = false; this.lives = 999; this.hintUsed = false;
    goScreen('s-quiz'); this.renderQ();
  },
  replay: function() {
    if (this.isBossMode || this.curLesson < 0) { this.startBoss(); return; }
    var all = getAllLessons();
    this.shuffled = all[this.curLesson].questions;
    this.curQ = 0; this.score = 0; this.answered = false; this.lives = 3; this.hintUsed = false;
    goScreen('s-quiz'); this.renderQ();
  },
  renderQ: function() {
    const q = this.shuffled[this.curQ];
    const topicTitle = this.getTopicTitle();
    this.answered = false; this.hintUsed = false; this.lastExplainText = '';

    document.getElementById('quiz-topic-lbl').textContent = topicTitle;
    document.getElementById('lesson-badge').textContent = topicTitle + ' · Вопрос '+(this.curQ+1)+' из '+this.shuffled.length;
    document.getElementById('quiz-counter').textContent = (this.curQ+1)+'/'+this.shuffled.length;
    document.getElementById('qpf').style.width = ((this.curQ/this.shuffled.length)*100)+'%';
    document.getElementById('q-tag').textContent = q.tag;
    document.getElementById('q-text').textContent = q.text;
    var btnHint = document.getElementById('btn-hint');
    btnHint.style.display = 'flex'; btnHint.disabled = false;
    btnHint.textContent = '🎓 Спросить профессора Гео';

    var livesEl = document.getElementById('lives-row');
    livesEl.innerHTML = '';
    for (var i=0; i<3; i++) livesEl.innerHTML += '<span>'+(i<this.lives?'❤️':'🖤')+'</span>';

    const btn = document.getElementById('btn-next');
    btn.classList.remove('show');
    btn.textContent = this.curQ < this.shuffled.length-1 ? 'Следующий вопрос →' : 'Посмотреть результат →';

    const ans = document.getElementById('answers');
    ans.innerHTML = '';
    ['А','Б','В','Г'].forEach(function(l, i){
      const b = document.createElement('button');
      b.className = 'ans-btn';
      b.innerHTML = '<div class="ans-letter">'+l+'</div><span>'+q.answers[i]+'</span>';
      b.onclick = function(){ QuestionSystem.selectAns(i, q.correct, q.text, topicTitle, q); };
      ans.appendChild(b);
    });
  },
  getTopicTitle: function() {
    if (this.isBossMode) return 'Финальный босс';
    var all = getAllLessons();
    return (all[this.curLesson] && all[this.curLesson].title) || 'Тренировка';
  },
  getTopicKey: function() {
    if (this.isBossMode) return 'topo';
    var all = getAllLessons();
    return (all[this.curLesson] && all[this.curLesson].key) || 'topo';
  },
  selectAns: function(idx, correct, qText, topic, question) {
    if (this.answered) return;
    this.answered = true;
    if (idx === correct && isTelegram && tgApp.HapticFeedback) {
      try { tgApp.HapticFeedback.notificationOccurred('success'); } catch(e){}
    }
    const btns = document.querySelectorAll('.ans-btn');
    btns[idx].classList.add(idx===correct?'correct':'wrong');
    if (idx !== correct) { btns[correct].classList.add('correct'); this.lives--; }
    if (idx === correct) { this.score++; XPSystem.addXP(10); }

    document.getElementById('btn-hint').style.display = 'none';
    var livesEl = document.getElementById('lives-row');
    livesEl.innerHTML = '';
    for (var i=0; i<3; i++) livesEl.innerHTML += '<span>'+(i<this.lives?'❤️':'🖤')+'</span>';

    ProfessorGeoWidget.showCorrectAnswer();
    if (idx !== correct) ProfessorGeoWidget.showWrongAnswer();

    document.getElementById('btn-next').classList.add('show');
    if (this.lives <= 0) document.getElementById('btn-next').textContent = '😔 Жизни кончились — попробуй ещё раз';
    DailyQuestSystem.incrementCounters(1, 0);
    DailyQuestSystem.update();
  },
  next: function() {
    this.curQ++;
    if (this.curQ >= this.shuffled.length) this.showResult();
    else this.renderQ();
  },
  showResult: function() {
    const total = this.shuffled.length;
    const pct = Math.round(this.score/total*100);
    if (this.isBossMode) {
      userProgress.bossCompleted = true; saveProgress();
      document.getElementById('boss-sub').textContent = this.score+'/'+total+' правильных ответов ('+pct+'%)';
      document.getElementById('boss-num').textContent = this.score;
      document.getElementById('boss-denom').textContent = 'из ' + total;
      goScreen('s-boss-result');
      setTimeout(()=>{ document.getElementById('boss-ring-fill').style.strokeDashoffset = 339*(1-this.score/total); }, 100);
      this.isBossMode = false; DailyQuestSystem.update(); return;
    }
    let e='😔', t='Нужно повторить';
    if (pct>=80) { e='🏆'; t='Отлично!'; } else if (pct>=60) { e='👍'; t='Хороший результат!'; } else if (pct>=40) { e='📖'; t='Продолжай учиться'; }
    document.getElementById('res-emoji').textContent = e;
    document.getElementById('res-title').textContent = t;
    document.getElementById('res-sub').textContent = `${pct}% правильных ответов`;
    document.getElementById('ring-num').textContent = this.score;
    document.getElementById('ring-denom').textContent = `из ${total}`;
    document.getElementById('res-c').textContent = this.score;
    document.getElementById('res-w').textContent = total-this.score;
    var xpGain = this.score*20 + (this.score===total ? 50 : 0);
    document.getElementById('res-xp').textContent = '+'+xpGain;
    this.saveLesson(this.curLesson, this.score, total);
    goScreen('s-result');
    setTimeout(()=>{ document.getElementById('ring-fill').style.strokeDashoffset = 339*(1-this.score/total); }, 100);
    DailyQuestSystem.update();
  },
  saveLesson: function(lessonIdx, sc, total) {
    var today = new Date().toISOString().slice(0,10);
    var all = getAllLessons();
    var key = all[lessonIdx] ? all[lessonIdx].title : String(lessonIdx);
    var wasNew = !userProgress.completedLessons[key];
    userProgress.completedLessons[key] = { score: sc, total: total, date: today, idx: lessonIdx };
    userProgress.totalAnswered += total; userProgress.totalCorrect += sc;
    var xpGain = sc * 20 + (sc === total ? 50 : 0);
    XPSystem.addXP(xpGain);
    checkStreak(); saveProgress();
    if (!userProgress.chests) userProgress.chests = [];
    if (!userProgress.completedLessons[key].chestGiven) {
      ChestSystem.give('achievement');
      userProgress.completedLessons[key].chestGiven = true;
      saveProgress();
    }
    if (wasNew) ProfessorGeoWidget.showFinishTopic();
  },
  getHint: function() {
    if (this.hintUsed) return;
    this.hintUsed = true;
    var topicKey = this.getTopicKey();
    ProfessorModal.openHint(topicKey);
  }
};

function getRank(xp) {
  if (xp >= 10000) return 'Легенда';
  if (xp >= 5000) return 'Мастер';
  if (xp >= 3000) return 'Эксперт';
  if (xp >= 500) return 'Ученик';

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  if (id === 's-home') renderHomePath();

function getDaysUntilOGE() {
  const today = new Date(); today.setHours(0,0,0,0);
  const currentYear = today.getFullYear();
  const ogeThisYear = new Date(currentYear, 5, 19);
  if (today <= ogeThisYear) return Math.ceil((ogeThisYear - today) / 86400000);
  const ogeNextYear = new Date(currentYear + 1, 5, 19);
  return Math.ceil((ogeNextYear - today) / 86400000);
}

function getPredictedGrade() {
  if (userProgress.totalAnswered === 0) return '—';
  var acc = userProgress.totalCorrect / userProgress.totalAnswered;
  if (acc >= 0.85) return '5';
  if (acc >= 0.70) return '4';
  if (acc >= 0.55) return '3';
  return '2';
}

async function renderHomePath() {
  var container = document.getElementById('home-content');
  if (lessonsLoaded.length === 0) {
    container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--muted)">⏳ Загружаю путь...</div>';
    await loadAllLessons();
  }
  var allLessons = getAllLessons();
  if (allLessons.length === 0) {
    container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--danger)">⚠️ Не удалось загрузить задания.</div>';
    return;
  }
  ProfessorGeoWidget.init();

  var completedCount = Object.keys(userProgress.completedLessons).length;
  var totalCount = allLessons.length;
  var pct = totalCount > 0 ? Math.round((completedCount/totalCount)*100) : 0;
  var allDone = completedCount >= totalCount;
  var daysLeft = getDaysUntilOGE();
  var predictedGrade = getPredictedGrade();
  var streak = userProgress.streak || 0;

  var html = '';
  html += `<div class="path-progress-card"><b>Прогноз ОГЭ</b><div style="font-size:42px;color:var(--gold)">${predictedGrade}</div><div style="font-size:11px;color:var(--muted)">🔥 ${streak} дней · ${daysLeft} дн. до ОГЭ</div></div>`;
  html += `<div class="path-progress-card"><div class="path-progress-top"><span>Прогресс</span><span>${pct}%</span></div><div class="path-progress-bar"><div class="path-progress-fill" style="width:0%" data-target="${pct}%"></div></div></div>`;

  if (!allDone) {
    var nextIdx = 0;
    for (var i = 0; i < allLessons.length; i++) {
      if (!userProgress.completedLessons[allLessons[i].title]) { nextIdx = i; break; }
    }
    html += `<div class="continue-card" onclick="QuestionSystem.start(${nextIdx})"><div class="continue-icon">▶️</div><div><div class="continue-label">Продолжить</div><div class="continue-title">${allLessons[nextIdx].title}</div></div></div>`;
  } else {
    html += `<div class="continue-card" onclick="QuestionSystem.startBoss()" style="background:linear-gradient(135deg,#3a2a0c,#2a1f08);border-color:#d2992250"><div class="continue-icon">👑</div><div><div class="continue-label" style="color:#d29922">Готово к финалу</div><div class="continue-title">Финальный босс</div></div></div>`;
  }

  container.innerHTML = html;
  document.getElementById('home-streak').textContent = '🔥 ' + (userProgress.streak||0);
  document.getElementById('home-sublabel').textContent = completedCount + '/' + totalCount + ' тем пройдено';
  setTimeout(() => {
    var fills = container.querySelectorAll('.path-progress-fill[data-target]');
    fills.forEach(f => f.style.width = f.getAttribute('data-target'));
  }, 50);
  animateCards(container);
}

function renderProfile() {
  var all = getAllLessons();
  var completedCount = Object.keys(userProgress.completedLessons).length;
  var acc = userProgress.totalAnswered > 0 ? Math.round((userProgress.totalCorrect/userProgress.totalAnswered)*100) : 0;
  var predictedGrade = getPredictedGrade();
  var rank = getRank(userProgress.xp);
  var chestCount = (userProgress.chests || []).length;

  var html = `<div class="profile-header-card"><div class="profile-avatar-big">🧑‍🎓</div><div><div class="profile-name-big">Ученик <span style="background:var(--primary);padding:2px 8px;border-radius:10px;font-size:12px">${rank}</span></div><div>⚡ Ур.${userProgress.level} · ${userProgress.xp} XP</div></div></div>`;
  html += `<div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="font-size:32px">🎯</div><div><div style="font-weight:700;font-size:15px">Прогноз на ОГЭ</div><div style="font-size:13px;color:var(--muted);margin-top:4px">Оценка <span style="color:var(--gold);font-weight:800">${predictedGrade}</span></div></div></div>`;
  html += `<div class="profile-stats-grid"><div class="profile-stat"><div class="profile-stat-num">${completedCount}/${all.length}</div><div class="profile-stat-label">Тем</div></div><div class="profile-stat"><div class="profile-stat-num">${acc}%</div><div class="profile-stat-label">Точность</div></div><div class="profile-stat"><div class="profile-stat-num">🔥 ${userProgress.streak||0}</div><div class="profile-stat-label">Дней</div></div></div>`;
  html += `<div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:12px 0;display:flex;justify-content:space-between;align-items:center;${chestCount>0?'animation: chestGlow 2s infinite, chestPulse 1.5s infinite;':''}">
    <div><div style="font-weight:700;font-size:15px">🎁 Сундуки</div><div style="font-size:12px;color:var(--muted);margin-top:3px">${chestCount>0?chestCount+' шт.':'Нет сундуков'}</div></div>
    <button onclick="ChestSystem.open()" style="background:var(--gold);color:#000;border:none;border-radius:12px;padding:8px 16px;font-family:var(--font-b);font-size:13px;font-weight:700;cursor:pointer;${chestCount===0?'opacity:0.5;background:gray !important;color:#fff;':''}" ${chestCount===0?'disabled':''}>Открыть</button>
  </div>`;
  document.getElementById('profile-content').innerHTML = html;
  setTimeout(() => {
    var fills = document.querySelectorAll('#profile-content .path-progress-fill[data-target]');
    fills.forEach(f => f.style.width = f.getAttribute('data-target'));
  }, 50);
  animateCards(document.getElementById('profile-content'));
}

function inviteFriend() {}
function shareBossResult() {}

var userProgress = {
  xp: 0, level: 1, streak: 0, lastDate: '',
  completedLessons: {}, totalAnswered: 0, totalCorrect: 0,
  bossCompleted: false, freezes: 1, lastFreezeMonday: '',
  chests: [], invitedFriend: false,
  dailyTasksDate: '', dailyTasks: { solve10: false, earn50XP: false, loginToday: false },
  dailyTasksCollected: { solve10: false, earn50XP: false, loginToday: false },
  allDailyTasksDone: false, dailyQuestions: 0, dailyXP: 0,
  achievements: {},
  lastDailyChestDate: '', streakChestsGiven: {},
  friends: [], freeHints: 0, rareBadges: [], doubleXPUntil: null,
  professorGreetingDate: ''
};

function saveProgress() {
  var data = JSON.stringify(userProgress);
  if (isTelegram && tgApp.CloudStorage) tgApp.CloudStorage.setItem('progress', data, ()=>{});
  else try { localStorage.setItem('geo_progress', data); } catch(e){}
}

function loadProgress(callback) {
  if (isTelegram && tgApp.CloudStorage) {
    tgApp.CloudStorage.getItem('progress', (err, val) => {
      if (!err && val) try { userProgress = JSON.parse(val); } catch(e){}
      refreshFreeze(); callback();
    });
  } else {
    try { var saved = localStorage.getItem('geo_progress'); if (saved) userProgress = JSON.parse(saved); } catch(e){}
    refreshFreeze(); callback();
  }
}

function refreshFreeze() {
  var todayMonday = new Date(new Date().setDate(new Date().getDate() - ((new Date().getDay() + 6) % 7))).toISOString().slice(0,10);
  if (!userProgress.lastFreezeMonday || userProgress.lastFreezeMonday < todayMonday) {
    userProgress.freezes = 1; userProgress.lastFreezeMonday = todayMonday; saveProgress();
  }
}

function checkStreak() {
  var today = new Date().toISOString().slice(0,10);
  if (userProgress.lastDate === today) return;
  var yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (userProgress.lastDate === yesterday) userProgress.streak++;
  else if (userProgress.lastDate !== today) {
    if (userProgress.freezes > 0) { userProgress.freezes = 0; userProgress.streak++; }
    else userProgress.streak = 1;
  }
  userProgress.lastDate = today; saveProgress();
  AchievementSystem.check(); ChestSystem.giveDaily(); ChestSystem.giveStreak();
}

function getDayWord(n) {
  if (n % 10 === 1 && n % 100 !== 11) return 'день';
  if ([2,3,4].includes(n%10) && ![12,13,14].includes(n%100)) return 'дня';
  return 'дней';
}

loadProgress(() => {
  checkStreak();
  renderHomePath();
  DailyQuestSystem.update();
  AchievementSystem.check();
});
</script>
