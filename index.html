<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ГеоПро — Подготовка к ОГЭ</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="modal-container"></div>

  <!-- Главный экран -->
  <div class="screen active" id="s-home">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar">🌍</div>
        <div><div class="username">ГеоПро</div><div class="sublabel" id="home-sublabel">Подготовка к ОГЭ</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="streak" id="home-streak">🔥 0</div>
        <div onclick="goScreen('s-profile')" style="width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer">👤</div>
      </div>
    </div>
    <div class="scroll" id="home-content" style="padding-top:8px">
      <div style="padding:20px;text-align:center;color:var(--muted)">⏳ Загружаю путь...</div>
    </div>
  </div>

  <!-- Экран темы -->
  <div class="screen" id="s-topic">
    <div class="topbar"><span class="back-link" onclick="goScreen('s-home')">← Назад</span><div class="sec-title" id="topic-title">Тема</div><div style="width:60px"></div></div>
    <div class="scroll" id="topic-content"></div>
  </div>

  <!-- Экран квиза -->
  <div class="screen" id="s-quiz">
    <div class="topbar">
      <span class="back-link" onclick="goScreen('s-home')">← Выйти</span>
      <div id="quiz-topic-lbl" style="font-size:11px;color:var(--muted)">Тренировка</div>
      <div id="quiz-counter" style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--primary)">1/5</div>
    </div>
    <div class="quiz-wrap">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="q-progress" style="flex:1"><div class="q-progress-fill" id="qpf" style="width:0%"></div></div>
        <div id="lives-row" style="display:flex;gap:3px;font-size:16px;flex-shrink:0"></div>
      </div>
      <div id="lesson-badge" style="background:#58a6ff12;border:1px solid #58a6ff25;border-radius:12px;padding:8px 12px;font-size:12px;color:var(--primary);font-weight:600"></div>
      <div class="q-card">
        <div class="q-tag" id="q-tag">Задание</div>
        <div class="q-text" id="q-text">...</div>
      </div>
      <div class="answers" id="answers"></div>
      <button id="btn-hint" onclick="askProfessor()" style="width:100%;background:transparent;border:1.5px solid #f5a62330;border-radius:var(--radius);padding:13px;color:#f5a623;font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">🎓 Спросить профессора Гео</button>
      <div id="ai-explain" style="display:none;background:#58a6ff0a;border:1px solid #58a6ff20;border-radius:14px;padding:14px;font-size:13px;line-height:1.6;color:#c8d8e8;margin-top:8px"></div>
      <button id="btn-ask-ai" style="display:none;width:100%;background:transparent;border:1.5px solid #58a6ff40;border-radius:var(--radius);padding:12px;color:var(--primary);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px" onclick="openAIChat()">💬 Обсудить с Профессором</button>
      <div id="ai-quiz" class="ai-panel" style="display:none"></div>
      <button class="btn-next" id="btn-next" onclick="nextQ()">Следующий вопрос →</button>
    </div>
  </div>

  <!-- Экран результата (старый) -->
  <div class="screen" id="s-result">
    <div class="result-wrap">
      <div class="result-emoji" id="res-emoji">🎉</div>
      <div class="result-title" id="res-title">Отлично!</div>
      <div class="result-sub" id="res-sub">Ты справился!</div>
      <div class="ring-wrap">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#3fb950"/></linearGradient></defs>
          <circle class="ring-bg" cx="65" cy="65" r="54"/>
          <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="54" stroke-dasharray="339" stroke-dashoffset="339"/>
        </svg>
        <div class="ring-text"><div class="ring-num" id="ring-num">0</div><div class="ring-denom" id="ring-denom">из 5</div></div>
      </div>
      <div class="res-stats">
        <div class="res-stat"><div class="res-num g" id="res-c">0</div><div class="res-label">Верно</div></div>
        <div class="res-stat"><div class="res-num r" id="res-w">0</div><div class="res-label">Ошибки</div></div>
        <div class="res-stat"><div class="res-num y" id="res-xp">+0</div><div class="res-label">XP</div></div>
      </div>
      <div class="res-btns">
        <button class="btn-full primary" onclick="goScreen('s-home')">🏠 На главную</button>
        <button class="btn-full sec" onclick="replayLesson()">🔄 Ещё раз</button>
      </div>
    </div>
  </div>

  <!-- Экран результата босса -->
  <div class="screen" id="s-boss-result">
    <div class="result-wrap">
      <div class="result-emoji">👑</div>
      <div class="result-title">Финальный босс пройден!</div>
      <div class="result-sub" id="boss-sub">Ты прошёл все темы ОГЭ</div>
      <div class="ring-wrap">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle class="ring-bg" cx="65" cy="65" r="54"/>
          <circle class="ring-fill" id="boss-ring-fill" cx="65" cy="65" r="54" stroke="#d29922" stroke-dasharray="339" stroke-dashoffset="339"/>
        </svg>
        <div class="ring-text"><div class="ring-num" id="boss-num">0</div><div class="ring-denom" id="boss-denom">из 30</div></div>
      </div>
      <div class="res-btns">
        <button class="btn-full primary" onclick="goScreen('s-home')">🏠 На главную</button>
        <button class="btn-full sec" onclick="shareBossResult()">📤 Похвастаться результатом</button>
      </div>
    </div>
  </div>

  <!-- Экран итогов занятия -->
  <div class="screen" id="s-session-summary">
    <div class="result-wrap" id="session-summary-content">
      <!-- Заполняется динамически -->
    </div>
  </div>

  <!-- Экран повторения -->
  <div class="screen" id="s-review">
    <div class="topbar">
      <span class="back-link" onclick="goScreen('s-home')">← Назад</span>
      <div class="sec-title">🔄 Повторение</div>
      <div style="width:60px"></div>
    </div>
    <div class="scroll" id="review-content"></div>
  </div>

  <!-- Экран профиля -->
  <div class="screen" id="s-profile">
    <div class="topbar"><span class="back-link" onclick="goScreen('s-home')">← Назад</span><div class="sec-title">👤 Профиль</div><div style="width:60px"></div></div>
    <div class="scroll" id="profile-content"></div>
  </div>

  <!-- Подключение скриптов (порядок важен!) -->
  <script src="js/config.js"></script>
  <script src="js/utils/common.js"></script>
  <script src="data/professor-messages.js"></script>
  <script src="data/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui/toast.js"></script>
  <script src="js/ui/modal.js"></script>
  <script src="js/systems/xp-system.js"></script>
  <script src="js/systems/streak.js"></script>
  <script src="js/systems/daily-quest.js"></script>
  <script src="js/systems/achievements.js"></script>
  <script src="js/systems/theory.js"></script>
  <script src="js/utils/skill-tagger.js"></script>
  <script src="js/systems/adaptive-selector.js"></script>
  <script src="js/systems/quiz-system.js"></script>
  <script src="js/systems/chest-system.js"></script>
  <script src="js/systems/professor.js"></script>
  <script src="js/systems/learning-path.js"></script>
  <script src="js/systems/review-system.js"></script>
  <script src="js/ui/components.js"></script>
  <script src="js/ui/screens.js"></script>
  <script src="js/app.js"></script>

  <!-- ВСТРОЕННЫЙ theory-cards.js (полная отладочная версия) -->
  <script>
    // ==========================================
    //  МИКРОУРОКИ (отладка структуры JSON)
    // ==========================================

    var microSteps = [];
    var microStepIndex = 0;
    var microTopicKey = '';

    function startTheoryCards(theoryInfo, data, topicKey) {
      alert('📦 startTheoryCards вызвана.\n\n' +
            'Тип данных: ' + typeof data + '\n' +
            'Содержит поле "cards"? ' + (data && data.cards ? 'Да (' + data.cards.length + ' шт.)' : 'Нет') + '\n' +
            'Является массивом? ' + Array.isArray(data) + '\n' +
            'Первый элемент: ' + (Array.isArray(data) ? JSON.stringify(data[0]).substring(0, 100) : (data && data.cards ? JSON.stringify(data.cards[0]).substring(0, 100) : '—')));

      let steps = [];

      if (data && Array.isArray(data.cards)) {
        steps = data.cards.map(card => {
          if (card.type === 'explain') {
            let text = card.text || '';
            if (card.example) text += '\n\n📝 Пример: ' + card.example;
            return { type: 'lesson', title: card.title || '', text: text };
          } else if (card.type === 'check') {
            return {
              type: 'quiz',
              quizQuestion: card.question,
              answers: card.options || [],
              correct: card.correct,
              explanation: card.explanation || ''
            };
          } else if (card.type === 'ready') {
            return { type: 'final', title: '🎉 Готов к практике', text: card.message || 'Ты прошёл весь материал!' };
          }
          return card;
        });
      } else if (Array.isArray(data)) {
        alert('⚠️ Старый формат (массив без "cards"). Микроурок пропущен.');
        goQuizFromLoaded(currentLessonIndex);
        return;
      } else {
        alert('❌ Неизвестный формат данных. Запускается практика.');
        goQuizFromLoaded(currentLessonIndex);
        return;
      }

      alert('✅ Шагов подготовлено: ' + steps.length);

      if (steps.length === 0) {
        goQuizFromLoaded(currentLessonIndex);
        return;
      }

      if (!userProgress.theoryRead) userProgress.theoryRead = {};
      var lesson = QUESTIONS_FILES[currentLessonIndex];
      if (lesson) {
        userProgress.theoryRead[lesson.title] = true;
        saveProgress();
      }

      microSteps = steps;
      microStepIndex = 0;
      microTopicKey = topicKey || 'micro';
      goScreen('s-topic');
      document.getElementById('topic-title').textContent = theoryInfo.title;
      renderMicroStep();
    }

    function renderMicroStep() {
      var container = document.getElementById('topic-content');
      if (!container) return;

      var step = microSteps[microStepIndex];
      var total = microSteps.length;
      var html = '';

      html += '<div class="theory-progress">';
      for (var i = 0; i < total; i++) {
        var dotClass = 'theory-progress-dot';
        var s = microSteps[i];
        if (s.type === 'quiz' || s.type === 'true_false' || s.type === 'choose_image') dotClass += ' quiz';
        else if (s.type === 'final') dotClass += ' final';
        else dotClass += ' lesson';
        if (i === microStepIndex) dotClass += ' active';
        else if (i < microStepIndex) dotClass += ' done';
        html += '<div class="' + dotClass + '"><span class="dot-icon">' + (s.type === 'quiz' || s.type === 'true_false' || s.type === 'choose_image' ? '🎯' : s.type === 'final' ? '🏁' : '📖') + '</span></div>';
      }
      html += '</div>';

      if (step.type === 'lesson') {
        html += '<div class="theory-card">';
        html += '<div class="theory-topic">' + (step.title || '') + '</div>';
        html += '<div class="theory-text">' + (step.text || '').replace(/\n/g, '<br>') + '</div>';
        html += '<button class="btn-full primary" onclick="nextMicroStep()">Продолжить →</button>';
        html += '</div>';
      } else if (step.type === 'quiz') {
        var answers = step.answers || [];
        var letters = answers.length === 3 ? ['А', 'Б', 'В'] : ['А', 'Б', 'В', 'Г'];
        html += '<div class="quiz-wrap" style="padding:0">';
        html += '<div class="q-card"><div class="q-text">' + (step.quizQuestion || step.question || '') + '</div></div>';
        html += '<div class="answers" id="micro-answers">';
        answers.forEach(function(ans, idx) {
          html += '<button class="ans-btn" onclick="answerMicroQuestion(' + idx + ')"><div class="ans-letter">' + letters[idx] + '</div><span>' + ans + '</span></button>';
        });
        html += '</div>';
        html += '<div id="micro-feedback" style="margin-top:12px;"></div>';
        html += '</div>';
      } else if (step.type === 'true_false') {
        html += '<div class="quiz-wrap" style="padding:0">';
        html += '<div class="q-card"><div class="q-text">' + (step.question || '') + '</div></div>';
        html += '<div class="true-false-buttons">';
        html += '<button class="true-false-btn true-btn" onclick="answerTrueFalse(true)">✅ Правда</button>';
        html += '<button class="true-false-btn false-btn" onclick="answerTrueFalse(false)">❌ Ложь</button>';
        html += '</div>';
        html += '<div id="micro-feedback" style="margin-top:12px;"></div>';
        html += '</div>';
      } else if (step.type === 'choose_image') {
        html += '<div class="quiz-wrap" style="padding:0">';
        html += '<div class="q-card"><div class="q-text">' + (step.question || '') + '</div></div>';
        html += '<div class="image-grid" id="micro-images">';
        step.images.forEach(function(img, idx) {
          html += '<div class="image-option" onclick="answerChooseImage(' + idx + ')" style="background-image:url(' + img.src + ')"></div>';
        });
        html += '</div>';
        html += '<div id="micro-feedback" style="margin-top:12px;"></div>';
        html += '</div>';
      } else if (step.type === 'final') {
        html += '<div class="theory-card">';
        html += '<div class="theory-topic">🏁 ' + (step.title || 'Финальный шаг') + '</div>';
        html += '<div class="theory-text">' + (step.text || 'Ты прошёл весь материал! Готов проверить знания?') + '</div>';
        html += '<button class="btn-full primary" onclick="startLessonPractice()">🚀 Начать практику</button>';
        html += '</div>';
      }

      container.innerHTML = html;
    }

    function nextMicroStep() {
      microStepIndex++;
      if (microStepIndex < microSteps.length) {
        renderMicroStep();
      } else {
        startLessonPractice();
      }
    }

    function processMicroAnswer(isCorrect, explanation) {
      var feedbackDiv = document.getElementById('micro-feedback');
      if (isCorrect) {
        addXP(5);
        feedbackDiv.innerHTML = '<div style="color:var(--primary2);margin-bottom:8px;">✅ Верно! ' + (explanation || '') + '</div>';
        if (typeof professor !== 'undefined') {
          professor.showMessage('Отлично! Идём дальше.', 'happy', 2000);
        }
        setTimeout(function() {
          microStepIndex++;
          if (microStepIndex < microSteps.length) {
            renderMicroStep();
          } else {
            startLessonPractice();
          }
        }, 1200);
      } else {
        feedbackDiv.innerHTML = '<div style="color:var(--danger);margin-bottom:8px;">❌ Неверно. ' + (explanation || 'Попробуй ещё раз.') + '</div>';
        if (typeof professor !== 'undefined') {
          professor.showMessage('Не переживай, это сложный момент. Попробуй ещё раз.', 'sad', 2500);
        }
        setTimeout(function() {
          renderMicroStep();
        }, 2000);
      }
    }

    function answerMicroQuestion(chosen) {
      var step = microSteps[microStepIndex];
      var correctIdx = step.correct;
      var isCorrect = (chosen === correctIdx);
      var btns = document.querySelectorAll('#micro-answers .ans-btn');
      btns.forEach(function(b) { b.disabled = true; });
      if (isCorrect) {
        btns[correctIdx].classList.add('correct');
      } else {
        btns[chosen].classList.add('wrong');
        btns[correctIdx].classList.add('correct');
      }
      processMicroAnswer(isCorrect, step.explanation);
    }

    function answerTrueFalse(value) {
      var step = microSteps[microStepIndex];
      var isCorrect = (value === step.correct);
      var buttons = document.querySelectorAll('.true-false-btn');
      buttons.forEach(function(b) { b.disabled = true; });
      if (isCorrect) {
        if (value === true) {
          document.querySelector('.true-btn').classList.add('correct-tf');
        } else {
          document.querySelector('.false-btn').classList.add('correct-tf');
        }
      } else {
        if (value === true) {
          document.querySelector('.true-btn').classList.add('wrong-tf');
          document.querySelector('.false-btn').classList.add('correct-tf');
        } else {
          document.querySelector('.false-btn').classList.add('wrong-tf');
          document.querySelector('.true-btn').classList.add('correct-tf');
        }
      }
      processMicroAnswer(isCorrect, step.explanation);
    }

    function answerChooseImage(chosen) {
      var step = microSteps[microStepIndex];
      var correctIdx = step.images.findIndex(function(img) { return img.correct === true; });
      var isCorrect = (chosen === correctIdx);
      var images = document.querySelectorAll('.image-option');
      images.forEach(function(img, idx) {
        img.style.pointerEvents = 'none';
        if (idx === correctIdx) img.classList.add('correct-img');
        if (idx === chosen && !isCorrect) img.classList.add('wrong-img');
      });
      processMicroAnswer(isCorrect, step.explanation);
    }
  </script>
</body>
</html>
