<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ГеоПро — Подготовка к ОГЭ</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --card2: #1c2333;
      --primary: #58a6ff;
      --primary2: #3fb950;
      --text: #f0f6fc;
      --muted: #8b949e;
      --danger: #f85149;
      --gold: #d29922;
      --border: #ffffff0c;
      --radius: 18px;
      --font-h: 'Unbounded', sans-serif;
      --font-b: 'Onest', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:var(--font-b); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
    body::before {
      content:''; position:fixed; inset:0;
      background: radial-gradient(circle at 15% 15%, #58a6ff14 0%, transparent 50%),
                  radial-gradient(circle at 85% 85%, #3fb95010 0%, transparent 50%);
      pointer-events:none; z-index:0;
    }
    .screen { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }
    .screen.active { display:flex; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .topbar {
      padding:16px 18px; display:flex; align-items:center; justify-content:space-between;
      background:#0f1620; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:20px; }
    .username { font-family:var(--font-h); font-size:13px; font-weight:700; }
    .sublabel { font-size:10px; color:var(--muted); }
    .streak { background:#f8514915; color:#f85149; font-weight:700; font-size:12px; padding:6px 12px; border-radius:20px; }
    .scroll { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding-bottom:88px; }
    .scroll::-webkit-scrollbar { width:3px; }
    .scroll::-webkit-scrollbar-thumb { background:#ffffff15; border-radius:8px; }
    .card-animate {
      opacity: 0; transform: translateY(20px);
      animation: cardAppear 0.45s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }
    @keyframes cardAppear { to { opacity:1; transform:translateY(0); } }
    .btn, .btn-full, .btn-next, .ans-btn, .continue-card, .modal-btn, button {
      transition: transform 0.12s ease, opacity 0.12s ease;
    }
    .btn:active, .btn-full:active, .btn-next:active, .ans-btn:active, .continue-card:active, .modal-btn:active, button:active {
      transform: scale(0.97) !important;
    }
    .path-progress-fill, .q-progress-fill { transition: width 0.8s cubic-bezier(0.2, 0.9, 0.3, 1); }
    .task-check { display: inline-block; transition: transform 0.25s ease, color 0.25s ease; }
    .task-check.done { color: var(--primary2) !important; animation: taskPop 0.35s ease; }
    @keyframes taskPop { 0% { transform: scale(0.8); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    .toast-container {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
      display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none;
    }
    .toast {
      background: rgba(28, 35, 51, 0.92); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 12px 20px;
      border-radius: 18px; font-weight: 600; font-size: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.3s forwards;
      pointer-events: auto; max-width: 90vw; text-align: center;
    }
    .toast.xp { border-left: 3px solid var(--primary2); }
    .toast.chest { border-left: 3px solid var(--gold); }
    .toast.achievement { border-left: 3px solid #c084fc; }
    .toast.streak { border-left: 3px solid #f97316; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-12px); } }

    /* quiz */
    .quiz-wrap { flex:1; padding:16px; display:flex; flex-direction:column; gap:14px; padding-bottom:24px; overflow-y:auto; }
    .q-progress { height:4px; background:var(--card2); border-radius:8px; overflow:hidden; }
    .q-progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); }
    .q-card { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
    .q-tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--primary); margin-bottom:10px; }
    .q-text { font-size:15px; line-height:1.55; font-weight:500; }
    .answers { display:flex; flex-direction:column; gap:8px; }
    .ans-btn { background:var(--card2); border:1.5px solid var(--border); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; font-family:var(--font-b); font-size:13px; color:var(--text); }
    .ans-btn.correct { border-color:var(--primary2); background:rgba(63,185,80,.1); }
    .ans-btn.wrong { border-color:var(--danger); background:rgba(248,81,73,.1); }
    .ans-letter { width:26px; height:26px; border-radius:8px; background:#2a3a55; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
    .ans-btn.correct .ans-letter { background:var(--primary2); }
    .ans-btn.wrong .ans-letter { background:var(--danger); }
    .btn-next { width:100%; background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; border:none; border-radius:var(--radius); padding:16px; font-family:var(--font-h); font-size:13px; font-weight:700; cursor:pointer; display:none; margin-top:4px; }
    .btn-next.show { display:block; animation: fadeUp .3s ease; }

    /* result */
    .result-wrap { flex:1; padding:40px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; overflow-y:auto; padding-bottom:32px; }
    .ring-wrap { position:relative; width:130px; height:130px; }
    .ring-wrap svg { transform:rotate(-90deg); }
    .ring-bg { fill:none; stroke:var(--card2); stroke-width:10; }
    .ring-fill { fill:none; stroke:url(#rg); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s ease; }
    .res-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; }
    .res-stat { background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px 8px; text-align:center; }
    .res-num { font-family:var(--font-h); font-size:18px; font-weight:800; }
    .res-num.g{color:var(--primary2)} .res-num.r{color:var(--danger)} .res-num.y{color:var(--gold)}
    .btn-full { width:100%; padding:16px; border-radius:var(--radius); font-family:var(--font-h); font-size:13px; font-weight:700; cursor:pointer; }
    .btn-full.primary { background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; border:none; }
    .btn-full.sec { background:transparent; color:var(--muted); border:1px solid var(--border); }

    /* path */
    .path-progress-card { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:6px; }
    .path-progress-bar { height:8px; background:#2d3a55; border-radius:8px; overflow:hidden; }
    .path-progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); border-radius:8px; }
    .continue-card { background:linear-gradient(135deg,#1a3a5c,#0f2438); border:1px solid #58a6ff40; border-radius:var(--radius); padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; }
    .node-circle { width:56px; height:56px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:22px; }
    .node-circle.done { background:var(--primary2); border:2px solid var(--primary2); }
    .node-circle.perfect { background:var(--gold); border:2px solid var(--gold); }
    .node-circle.current { background:#f5a623; border:2px solid #f5a623; box-shadow:0 0 0 6px #f5a62320; animation: pulseNode 2s infinite; }
    .node-circle.locked { background:var(--card2); border:2px solid var(--border); opacity:.4; }
    @keyframes pulseNode { 0%,100%{box-shadow:0 0 0 6px #f5a62320} 50%{box-shadow:0 0 0 10px #f5a62308} }
    .boss-node { width:72px; height:72px; border-radius:20px; flex-shrink:0; background:linear-gradient(135deg,#d29922,#b8860b); border:2px solid #d29922; display:flex; align-items:center; justify-content:center; font-size:30px; }
    .boss-node.locked { background:var(--card2); border-color:var(--border); opacity:.35; }

    /* ===== PROFESSOR GEO - UPDATED WITH IMAGES ===== */
    .professor-fab {
      position: fixed;
      bottom: -10px;
      right: -5px;
      width: 130px;
      height: 170px;
      background: none;
      box-shadow: none;
      border: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
      z-index: 900;
      transition: transform 0.2s ease, opacity 0.3s ease;
      animation: professorAppear 0.6s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }
    @keyframes professorAppear {
      from { opacity: 0; transform: translateY(40px) scale(0.8); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .professor-fab img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 4px 15px rgba(0,0,0,0.4));
      transition: opacity 0.3s ease;
    }
    .professor-fab:active {
      transform: scale(0.95) !important;
    }
    .professor-fab.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
    }

    .professor-speech {
      position: fixed;
      bottom: 165px;
      right: 24px;
      max-width: 260px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 12px 25px rgba(0,0,0,0.5);
      z-index: 901;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: auto;
      line-height: 1.5;
    }
    .professor-speech.hidden {
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
    }
    .professor-speech::after {
      content: '';
      position: absolute;
      bottom: -10px;
      right: 30px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid var(--card2);
    }
    .professor-speech::before {
      content: '';
      position: absolute;
      bottom: -11px;
      right: 29px;
      width: 0;
      height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 11px solid var(--border);
    }

    /* Quiz professor - appears next to answers during quiz */
    .quiz-professor {
      position: fixed;
      bottom: 80px;
      right: 10px;
      width: 100px;
      height: 130px;
      z-index: 100;
      pointer-events: none;
      animation: professorAppear 0.5s ease forwards;
    }
    .quiz-professor img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: bottom center;
      filter: drop-shadow(0 3px 10px rgba(0,0,0,0.3));
    }
    .quiz-professor.hidden {
      opacity: 0;
      transform: translateY(20px);
    }

    .quiz-professor-speech {
      position: fixed;
      bottom: 210px;
      right: 20px;
      max-width: 220px;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 12px;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      z-index: 101;
      transition: opacity 0.25s, transform 0.25s;
      line-height: 1.5;
    }
    .quiz-professor-speech.hidden {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
    }
    .quiz-professor-speech::after {
      content: '';
      position: absolute;
      bottom: -8px;
      right: 25px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid var(--card2);
    }

    /* chat */
    .chat-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 1100;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeInOverlay 0.25s ease;
    }
    .chat-sheet {
      background: var(--card2); border: 1px solid var(--border); border-radius: 24px 24px 0 0;
      width: 100%; max-width: 500px; height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 -15px 35px rgba(0,0,0,0.6);
      animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    .chat-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
    .chat-avatar { width:44px; height:44px; border-radius:16px; overflow:hidden; background:linear-gradient(135deg,#4a6fa5,#3b5998); display:flex; align-items:center; justify-content:center; }
    .chat-avatar img { width:100%; height:100%; object-fit:cover; }
    .chat-name { font-family:var(--font-h); font-size:16px; font-weight:700; }
    .chat-topic { font-size:11px; color:var(--primary); margin-top:2px; }
    .chat-close { width:36px; height:36px; border-radius:50%; background:var(--card); border:1px solid var(--border); color:var(--muted); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .chat-msg { max-width:85%; padding:12px 14px; border-radius:16px; font-size:13px; line-height:1.5; }
    .chat-msg.user { align-self:flex-end; background:var(--primary); color:#fff; border-bottom-right-radius:4px; }
    .chat-msg.professor { align-self:flex-start; background:var(--card); border:1px solid var(--border); color:var(--text); border-bottom-left-radius:4px; }
    .chat-msg.loading { align-self:flex-start; background:transparent; color:var(--muted); font-style:italic; }
    .chat-quick-actions { display:flex; gap:8px; padding:8px 16px; overflow-x:auto; border-top:1px solid var(--border); }
    .chat-quick-btn { flex-shrink:0; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:8px 14px; font-size:12px; color:var(--text); cursor:pointer; font-family:var(--font-b); }
    .chat-input-row { display:flex; gap:8px; padding:12px 16px 20px; border-top:1px solid var(--border); }
    .chat-input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 14px; color:var(--text); font-family:var(--font-b); font-size:13px; outline:none; }
    .chat-send-btn { width:44px; height:44px; border-radius:14px; background:var(--primary); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    @keyframes fadeInOverlay { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { transform:translateY(100%); opacity:0; } to { transform:translateY(0); opacity:1; } }

    /* Home screen hero */
    .hero-professor {
      position: absolute;
      top: 60px;
      right: 10px;
      width: 140px;
      height: 180px;
      z-index: 2;
      pointer-events: none;
      animation: heroAppear 0.8s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
    }
    @keyframes heroAppear {
      from { opacity: 0; transform: translateX(30px) scale(0.9); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }
    .hero-professor img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(0,0,0,0.4));
    }

    /* Back link */
    .back-link { font-size:13px; color:var(--muted); cursor:pointer; }
    .sec-title { font-family:var(--font-h); font-size:15px; font-weight:700; }

    /* Profile */
    .profile-header-card { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; display:flex; align-items:center; gap:16px; margin-bottom:14px; }
    .profile-avatar-big { width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:32px; }
    .profile-name-big { font-family:var(--font-h); font-size:16px; font-weight:700; margin-bottom:4px; }

    /* Result */
    .result-emoji { font-size:48px; }
    .result-title { font-family:var(--font-h); font-size:22px; font-weight:800; }
    .result-sub { color:var(--muted); font-size:14px; }
    .ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .ring-num { font-family:var(--font-h); font-size:28px; font-weight:800; }
    .ring-denom { font-size:12px; color:var(--muted); }
    .res-label { font-size:11px; color:var(--muted); margin-top:4px; }
    .res-btns { width:100%; display:flex; flex-direction:column; gap:10px; margin-top:8px; }

    /* Continue label */
    .continue-label { font-size:11px; color:var(--primary); font-weight:600; margin-bottom:2px; }

    /* Boss result screen */
    .boss-result-wrap { flex:1; padding:40px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; overflow-y:auto; padding-bottom:32px; }
    .boss-emoji { font-size:48px; }
    .boss-title { font-family:var(--font-h); font-size:22px; font-weight:800; }
    .boss-sub { color:var(--muted); font-size:14px; }
  </style>
</head>
<body>
<div id="toast-container" class="toast-container"></div>

<!-- Screens -->
<div class="screen active" id="s-home">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="avatar">🌍</div>
      <div><div class="username">ГеоПро</div><div class="sublabel" id="home-sublabel">Подготовка к ОГЭ</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="streak" id="home-streak">🔥 0</div>
      <div onclick="goScreen('s-profile')" style="width:36px;height:36px;border-radius:50%;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer">👤</div>
    </div>
  </div>
  <div class="scroll" id="home-content"><div style="padding:20px;text-align:center;color:var(--muted)">⏳ Загружаю путь...</div></div>

  <!-- Hero professor on home screen -->
  <div class="hero-professor" id="hero-professor">
    <img src="https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_hero.png" alt="Профессор Гео">
  </div>
</div>

<div class="screen" id="s-quiz">
  <div class="topbar">
    <span class="back-link" onclick="goScreen('s-home')">← Выйти</span>
    <div id="quiz-topic-lbl" style="font-size:11px;color:var(--muted)">Тренировка</div>
    <div id="quiz-counter" style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--primary)">1/5</div>
  </div>
  <div class="quiz-wrap">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="q-progress" style="flex:1"><div class="q-progress-fill" id="qpf" style="width:0%"></div></div>
      <div id="lives-row" style="display:flex;gap:3px;font-size:16px;"></div>
    </div>
    <div id="lesson-badge" style="background:#58a6ff12;border:1px solid #58a6ff25;border-radius:12px;padding:8px 12px;font-size:12px;color:var(--primary);font-weight:600"></div>
    <div class="q-card"><div class="q-tag" id="q-tag"></div><div class="q-text" id="q-text"></div></div>
    <div class="answers" id="answers"></div>
    <button id="btn-hint" onclick="QuestionSystem.getHint()" style="width:100%;background:transparent;border:1.5px solid #f5a62330;border-radius:var(--radius);padding:13px;color:#f5a623;font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">🎓 Спросить профессора Гео</button>
    <button class="btn-next" id="btn-next" onclick="QuestionSystem.next()">Следующий вопрос →</button>
  </div>

  <!-- Quiz professor -->
  <div class="quiz-professor hidden" id="quiz-professor">
    <img src="https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_default.png" alt="Профессор Гео" id="quiz-professor-img">
  </div>
  <div class="quiz-professor-speech hidden" id="quiz-professor-speech"></div>
</div>

<div class="screen" id="s-result">
  <div class="result-wrap">
    <div class="result-emoji" id="res-emoji">🎉</div>
    <div class="result-title" id="res-title">Отлично!</div>
    <div class="result-sub" id="res-sub">Ты справился!</div>
    <div class="ring-wrap">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%"><stop offset="0%" stop-color="#58a6ff"/><stop offset="100%" stop-color="#3fb950"/></linearGradient></defs>
        <circle class="ring-bg" cx="65" cy="65" r="54"/>
        <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="54" stroke-dasharray="339" stroke-dashoffset="339"/>
      </svg>

<script>
// ========== IMAGE URLs ==========
const PROF_IMAGES = {
  default: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_default.png',
  happy: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_happy.png',
  sad: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_sad.png',
  hint: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_hint.png',
  chat: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_chat_avatar.png',
  hero: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_hero.png'
};

// ---------- DATA ----------
const GITHUB_RAW = 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/theory/';
const QUESTIONS_FILES = [
  { key:'topo', title:'🗺 Топографические карты', file:'questions_topo.json' },
  { key:'climat', title:'📊 Климат и климатограммы', file:'questions_climat.json' },
  { key:'nature_russia', title:'🌋 Природа России', file:'questions_nature_russia.json' },
  { key:'ecology', title:'🌱 Экология', file:'questions_ecology.json' },
  { key:'timezone', title:'🕐 Часовые пояса', file:'questions_timezone.json' },
  { key:'world', title:'🌍 Страны и материки', file:'questions_world.json' },
  { key:'regions', title:'📍 Регионы России', file:'questions_regions.json' },
  { key:'litosphere', title:'⛰ Литосфера и рельеф', file:'questions_litosphere.json' },
  { key:'hydro', title:'💧 Гидросфера', file:'questions_hydro.json' },
  { key:'population', title:'👥 Население России', file:'questions_population.json' },
  { key:'geopos', title:'📍 Геогр. положение России', file:'questions_geopos.json' },
  { key:'economy', title:'🏭 Хозяйство России', file:'questions_economy.json' },
  { key:'zones', title:'🌲 Природные зоны', file:'questions_zones.json' }
];

let lessonsLoaded = [];
async function fetchJSON(filename) {
  try {
    const r = await fetch(GITHUB_RAW + filename + '?nocache=' + Date.now());
    return r.ok ? r.json() : [];
  } catch(e) {
    console.warn('Ошибка загрузки', filename, e);
    return [];
  }
}
async function loadAllLessons() {
  if (lessonsLoaded.length) return; // уже загружены
  lessonsLoaded = [];
  for (let f of QUESTIONS_FILES) {
    const data = await fetchJSON(f.file);
    const questions = (Array.isArray(data) ? data : []).filter(q => q.tag && q.text && q.answers);
    if (questions.length) lessonsLoaded.push({ ...f, questions });
  }
}
function getAllLessons() { return lessonsLoaded; }

// ---------- GLOBAL STATE ----------
const tgApp = window.Telegram?.WebApp;
const isTelegram = !!tgApp?.initData;
if (isTelegram) { tgApp.ready(); tgApp.expand(); }

let userProgress = {
  xp:0, level:1, streak:0, lastDate:'', completedLessons:{}, totalAnswered:0, totalCorrect:0,
  bossCompleted:false, freezes:1, lastFreezeMonday:'', chests:[], invitedFriend:false,
  dailyTasksDate:'', dailyTasks:{solve10:false,earn50XP:false,loginToday:false},
  dailyTasksCollected:{solve10:false,earn50XP:false,loginToday:false},
  allDailyTasksDone:false, dailyQuestions:0, dailyXP:0, achievements:{},
  lastDailyChestDate:'', streakChestsGiven:{}, professorGreetingDate:''
};

function saveProgress() {
  const data = JSON.stringify(userProgress);
  if (isTelegram) {
    tgApp.CloudStorage.setItem('progress', data, (err) => {
      if (err) console.warn('CloudStorage save error', err);
    });
  } else {
    try { localStorage.setItem('geo_progress', data); } catch(e) {}
  }
}
function loadProgress(cb) {
  if (isTelegram) {
    tgApp.CloudStorage.getItem('progress', (err, val) => {
      if (!err && val) {
        try { userProgress = JSON.parse(val); } catch(e) { userProgress = {...userProgress}; }
      }
      refreshFreeze();
      cb();
    });
  } else {
    try { const s = localStorage.getItem('geo_progress'); if(s) userProgress = JSON.parse(s); } catch(e) {}
    refreshFreeze();
    cb();
  }
}

function refreshFreeze() {
  const d = new Date(); d.setHours(0,0,0,0);
  const day = d.getDay();
  const monday = new Date(d.setDate(d.getDate() - ((day + 6) % 7))).toISOString().slice(0,10);
  if (!userProgress.lastFreezeMonday || userProgress.lastFreezeMonday < monday) {
    userProgress.freezes = 1; userProgress.lastFreezeMonday = monday; saveProgress();
  }
}
function checkStreak() {
  const today = new Date().toISOString().slice(0,10);
  if (userProgress.lastDate === today) return;
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (userProgress.lastDate === yesterday) userProgress.streak++;
  else if (userProgress.lastDate !== today) {
    if (userProgress.freezes > 0) { userProgress.freezes--; userProgress.streak++; }
    else userProgress.streak = 1;
  }
  userProgress.lastDate = today; saveProgress();
  AchievementSystem.check(); ChestSystem.giveDaily(); ChestSystem.giveStreak();
}

function showToast(text, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type; t.textContent = text;
  c.appendChild(t); setTimeout(() => t.remove(), 2600);
}

// ---------- SYSTEMS ----------
const XPSystem = {
  addXP(amount) {
    if (amount <= 0) return;
    if (userProgress.doubleXPUntil && new Date(userProgress.doubleXPUntil) > new Date()) amount *= 2;
    userProgress.xp += amount;
    userProgress.level = Math.floor(userProgress.xp / 200) + 1;
    saveProgress(); showToast('⚡ +' + amount + ' XP', 'xp');
    AchievementSystem.check();
    DailyQuestSystem.incrementCounters(0, amount);
  }
};

const DailyQuestSystem = {
  update() {
    const today = new Date().toISOString().slice(0,10);
    if (userProgress.dailyTasksDate !== today) {
      userProgress.dailyTasksDate = today;
      userProgress.dailyTasks = { solve10:false, earn50XP:false, loginToday:true };
      userProgress.dailyTasksCollected = { solve10:false, earn50XP:false, loginToday:false };
      userProgress.allDailyTasksDone = false; saveProgress();
    }
    const tasks = userProgress.dailyTasks, collected = userProgress.dailyTasksCollected;
    if (userProgress.dailyQuestions >= 10 && !tasks.solve10) {
      tasks.solve10 = true; if (!collected.solve10) { collected.solve10 = true; XPSystem.addXP(20); }
    }
    if (userProgress.dailyXP >= 50 && !tasks.earn50XP) {
      tasks.earn50XP = true; if (!collected.earn50XP) { collected.earn50XP = true; XPSystem.addXP(20); }
    }
    if (!tasks.loginToday) { tasks.loginToday = true; if (!collected.loginToday) { collected.loginToday = true; XPSystem.addXP(20); } }
    if (tasks.solve10 && tasks.earn50XP && tasks.loginToday && !userProgress.allDailyTasksDone) {
      userProgress.allDailyTasksDone = true; XPSystem.addXP(100); ChestSystem.give('achievement');
    }
    saveProgress();
  },
  incrementCounters(q, xp) {
    const today = new Date().toISOString().slice(0,10);
    if (userProgress.dailyTasksDate !== today) { userProgress.dailyQuestions=0; userProgress.dailyXP=0; }
    userProgress.dailyQuestions += q; userProgress.dailyXP += xp; saveProgress(); this.update();
  }
};

const ACHIEVEMENTS_LIST = [
  { id:'first_login', icon:'🏆', title:'Первый вход', cond:()=>true },
  { id:'first_lesson', icon:'🏆', title:'Первый урок', cond:()=>userProgress.totalAnswered>0 },
  { id:'streak3', icon:'🔥', title:'3 дня подряд', cond:()=>(userProgress.streak||0)>=3 },
  { id:'solve50', icon:'📚', title:'50 вопросов', cond:()=>userProgress.totalAnswered>=50, max:50, progress:()=>Math.min(userProgress.totalAnswered,50) },
  { id:'xp500', icon:'⭐', title:'500 XP', cond:()=>userProgress.xp>=500, max:500, progress:()=>Math.min(userProgress.xp,500) },
];

const AchievementSystem = {
  check() {
    if (!userProgress.achievements) userProgress.achievements = {};
    const now = new Date().toISOString();
    ACHIEVEMENTS_LIST.forEach(a => {
      if (userProgress.achievements[a.id]?.unlocked) return;
      const unlocked = a.cond();
      const progress = a.progress ? a.progress() : (unlocked ? 1 : 0);
      if (!userProgress.achievements[a.id]) userProgress.achievements[a.id] = { progress, unlocked, date: unlocked?now:null, chestGiven:false };
      else {
        userProgress.achievements[a.id].progress = progress;
        if (unlocked && !userProgress.achievements[a.id].unlocked) {
          userProgress.achievements[a.id].unlocked = true; userProgress.achievements[a.id].date = now;
          showToast('🏆 ' + a.title, 'achievement');
          if (!userProgress.achievements[a.id].chestGiven) {
            ChestSystem.give('achievement'); userProgress.achievements[a.id].chestGiven = true;
          }
        }
      }
    });
    saveProgress();
  }
};

const ChestSystem = {
  give(type) { if (!userProgress.chests) userProgress.chests = []; userProgress.chests.push({type}); saveProgress(); showToast('🎁 Сундук получен!', 'chest'); },
  giveDaily() { const today = new Date().toISOString().slice(0,10); if (userProgress.lastDailyChestDate!==today) { userProgress.lastDailyChestDate=today; this.give('daily'); } },
  giveStreak() { const s = userProgress.streak||0; const given = userProgress.streakChestsGiven||{}; [3,7,14,30].forEach(t => { if (s>=t && !given[t]) { this.give('streak'); given[t]=true; } }); userProgress.streakChestsGiven=given; saveProgress(); }
};

// ---------- PROFESSOR GEO - UPDATED WITH MOODS ----------
const ProfessorGeo = {
  HAPPY: ["Отлично! 🎉","Верно! 🎉","Так держать! 🎉","Молодец! 🎉","Правильно! 🎉"],
  SAD: ["Не страшно 🤔","Запомни эту тему 🤔","Подумай ещё 🤔","Ошибки учат 🤔","Разберёмся! 🤔"],
  timer: null,
  currentMood: 'default',

  setMood(mood) {
    this.currentMood = mood;
    const img = document.getElementById('professor-img');
    const quizImg = document.getElementById('quiz-professor-img');
    if (img && PROF_IMAGES[mood]) {
      img.style.opacity = '0';
      setTimeout(() => { img.src = PROF_IMAGES[mood]; img.style.opacity = '1'; }, 150);
    }
    if (quizImg && PROF_IMAGES[mood]) {
      quizImg.style.opacity = '0';
      setTimeout(() => { quizImg.src = PROF_IMAGES[mood]; quizImg.style.opacity = '1'; }, 150);
    }
  },

  show(text, duration=3000) {
    const el = document.getElementById('professor-speech');
    const quizEl = document.getElementById('quiz-professor-speech');
    if (!el && !quizEl) return;
    if (this.timer) clearTimeout(this.timer);

    const isQuiz = document.getElementById('s-quiz').classList.contains('active');
    // Скрываем все speech перед показом
    this.hideSpeechElements();

    if (isQuiz && quizEl) {
      quizEl.textContent = text;
      quizEl.classList.remove('hidden');
    } else if (el) {
      el.textContent = text;
      el.classList.remove('hidden');
    }

    this.timer = setTimeout(() => this.hide(), duration);
  },

  hide() {
    this.hideSpeechElements();
    if (this.timer) clearTimeout(this.timer);
    setTimeout(() => this.setMood('default'), 300);
  },

  hideSpeechElements() {
    const el = document.getElementById('professor-speech');
    const quizEl = document.getElementById('quiz-professor-speech');
    if (el) el.classList.add('hidden');
    if (quizEl) quizEl.classList.add('hidden');
  },

  showHappy() {
    this.setMood('happy');
    this.show(this.HAPPY[Math.floor(Math.random()*this.HAPPY.length)]);
  },

  showSad() {
    this.setMood('sad');
    this.show(this.SAD[Math.floor(Math.random()*this.SAD.length)]);
  },

  showHint(text) {
    this.setMood('hint');
    this.show('💡 ' + text, 4000);
  }
};

// ---------- PROFESSOR CHAT ----------
const ProfessorChat = {
  history: [],
  currentTopic: 'Общая подготовка',
  isOpen: false,
  open() {
    if (this.isOpen) return;
    this.isOpen = true;
    const fab = document.getElementById('professor-fab');
    if (fab) fab.classList.add('hidden');
    ProfessorGeo.hide();

    try { this.currentTopic = document.getElementById('s-quiz').classList.contains('active') ? QuestionSystem.getTopicTitle() : 'Общая подготовка'; } catch(e) {}
    document.getElementById('chat-current-topic').textContent = '📚 ' + this.currentTopic;
    document.getElementById('chat-overlay').style.display = 'flex';
    if (!this.history.length) this.addMessage('professor', 'Привет! Я Профессор Гео, твой AI-наставник по географии. Задай вопрос или выбери тему для обсуждения! 🌍');
    this.render();
  },
  close() {
    this.isOpen = false;
    document.getElementById('chat-overlay').style.display = 'none';
    const fab = document.getElementById('professor-fab');
    if (fab) fab.classList.remove('hidden');
  },
  addMessage(role, text) { this.history.push({role, text}); this.render(); },
  render() {
    const c = document.getElementById('chat-messages');
    if (!c) return;
    c.innerHTML = this.history.map(m => {
      if (m.role === 'loading') return '<div class="chat-msg loading">⏳ Профессор думает...</div>';
      return `<div class="chat-msg ${m.role}">${m.text.replace(/\\n/g,'<br>')}</div>`;
    }).join('');
    c.scrollTop = c.scrollHeight;
  },
  async sendMessage(text) {
    if (!text?.trim()) return;
    const input = document.getElementById('chat-input'); if (input) input.value = '';
    this.addMessage('user', text.trim());
    this.history.push({role:'loading', text:''}); this.render();
    try {
      const reply = await sendToProfessor(text, this.currentTopic);
      this.history = this.history.filter(m => m.role !== 'loading');
      this.addMessage('professor', reply);
    } catch(e) {
      this.history = this.history.filter(m => m.role !== 'loading');
      this.addMessage('professor', '⚠️ Ошибка связи. Попробуй позже.');
    }
  }
};

async function sendToProfessor(msg, topic) {
  await new Promise(r => setTimeout(r, 800 + Math.random()*1200));
  const m = msg.toLowerCase();
  if (m.includes('объясни')) return `📘 Тема «${topic}» — одна из ключевых на ОГЭ. Сосредоточься на основных понятиях, определениях и типовых заданиях. Практика закрепит знания!`;
  if (m.includes('подсказк')) return `💡 Внимательно прочитай вопрос. Ключевые слова часто содержат подсказку к ответу. Если не уверен — исключай заведомо неверные варианты.`;
  if (m.includes('огэ')) return `❓ На ОГЭ по географии спрашивают: топографические карты, климатограммы, природу России, регионы, население, хозяйство. Регулярная тренировка — залог успеха!`;
  if (m.includes('привет') || m.includes('здрав')) return `👋 Привет! Рад тебя видеть! Готов помочь с подготовкой к ОГЭ. Какая тема интересует?`;
  if (m.includes('спасибо')) return `😊 Всегда рад помочь! Продолжай в том же духе — у тебя всё получится!`;
  return `🤔 Интересный вопрос! По теме «${topic}» рекомендую: повтори теорию, порешай тесты и не бойся ошибок — они лучшие учителя.`;
}

document.getElementById('professor-fab').addEventListener('click', () => { ProfessorGeo.hide(); ProfessorChat.open(); });
document.getElementById('chat-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) ProfessorChat.close(); });

// ---------- QUIZ SYSTEM ----------
const QuestionSystem = {
  curQ:0, score:0, answered:false, shuffled:[], curLesson:0, lives:3, hintUsed:false, isBoss:false,
  async start(idx) {
    const all = getAllLessons();
    if (!all.length) {
      showToast('Загружаю уроки...');
      await loadAllLessons();
      if (!getAllLessons().length) { showToast('Не удалось загрузить уроки', 'danger'); return; }
    }
    this.curLesson = idx; this.shuffled = all[idx].questions;
    this.curQ=0; this.score=0; this.lives=3; this.hintUsed=false; this.isBoss=false;
    goScreen('s-quiz'); this.renderQ();
    const qp = document.getElementById('quiz-professor');
    if (qp) qp.classList.remove('hidden');
  },
  async startBoss() {
    let all = getAllLessons();
    if (!all.length) {
      showToast('Загружаю уроки...');
      await loadAllLessons();
      all = getAllLessons();
      if (!all.length) { showToast('Не удалось загрузить уроки', 'danger'); return; }
    }
    let qs = []; all.forEach(l => qs = qs.concat(l.questions));
    qs = qs.sort(()=>Math.random()-0.5).slice(0,30);
    this.isBoss = true; this.shuffled = qs; this.curQ=0; this.score=0; this.lives=999; this.hintUsed=false;
    goScreen('s-quiz'); this.renderQ();
    const qp = document.getElementById('quiz-professor');
    if (qp) qp.classList.remove('hidden');
  },
  replay() { if (this.isBoss) this.startBoss(); else this.start(this.curLesson); },
  renderQ() {
    const q = this.shuffled[this.curQ]; this.answered = false; this.hintUsed = false;
    document.getElementById('quiz-topic-lbl').textContent = this.getTopicTitle();
    document.getElementById('lesson-badge').textContent = `${this.getTopicTitle()} · Вопрос ${this.curQ+1}/${this.shuffled.length}`;
    document.getElementById('quiz-counter').textContent = `${this.curQ+1}/${this.shuffled.length}`;
    document.getElementById('qpf').style.width = (this.curQ/this.shuffled.length*100)+'%';
    document.getElementById('q-tag').textContent = q.tag; document.getElementById('q-text').textContent = q.text;
    document.getElementById('btn-hint').style.display='flex'; document.getElementById('btn-hint').disabled=false;
    document.getElementById('lives-row').innerHTML = Array.from({length:3},(_,i)=>`<span>${i<this.lives?'❤️':'🖤'}</span>`).join('');
    const next = document.getElementById('btn-next'); next.classList.remove('show');
    next.textContent = this.curQ < this.shuffled.length-1 ? 'Следующий вопрос →' : 'Результат →';
    const ans = document.getElementById('answers'); ans.innerHTML = '';
    ['А','Б','В','Г'].forEach((l,i) => {
      const b = document.createElement('button'); b.className='ans-btn';
      b.innerHTML = `<div class="ans-letter">${l}</div><span>${q.answers[i]}</span>`;
      b.onclick = () => this.selectAns(i, q.correct);
      ans.appendChild(b);
    });
    ProfessorGeo.setMood('default');
  },
  getTopicTitle() { return this.isBoss ? 'Финальный босс' : (getAllLessons()[this.curLesson]?.title || 'Тренировка'); },
  getTopicKey() { return this.isBoss ? 'topo' : (getAllLessons()[this.curLesson]?.key || 'topo'); },
  selectAns(idx, correct) {
    if (this.answered) return; this.answered = true;
    if (idx === correct && isTelegram && tgApp.HapticFeedback) tgApp.HapticFeedback.notificationOccurred('success');
    const btns = document.querySelectorAll('.ans-btn');
    btns[idx].classList.add(idx===correct?'correct':'wrong');
    if (idx !== correct) { btns[correct].classList.add('correct'); this.lives--; ProfessorGeo.showSad(); }
    else { this.score++; XPSystem.addXP(10); ProfessorGeo.showHappy(); }
    document.getElementById('btn-hint').style.display='none';
    document.getElementById('lives-row').innerHTML = Array.from({length:3},(_,i)=>`<span>${i<this.lives?'❤️':'🖤'}</span>`).join('');
    document.getElementById('btn-next').classList.add('show');
    if (this.lives<=0) document.getElementById('btn-next').textContent = '😔 Жизни кончились';
    DailyQuestSystem.incrementCounters(1,0); DailyQuestSystem.update();
  },
  next() {
    this.curQ++;
    if (this.curQ >= this.shuffled.length) {
      const qp = document.getElementById('quiz-professor');
      if (qp) qp.classList.add('hidden');
      ProfessorGeo.hide();
      this.showResult();
    } else {
      this.renderQ();
    }
  },
  getHint() { if (this.hintUsed) return; this.hintUsed = true; ProfessorGeo.showHint('Подумай, какие ключевые слова в вопросе помогают найти ответ.'); document.getElementById('btn-hint').disabled = true; },
  showResult() {
    const total = this.shuffled.length, pct = Math.round(this.score/total*100);
    if (this.isBoss) {
      userProgress.bossCompleted = true; saveProgress();
      document.getElementById('boss-sub').textContent = `${this.score}/${total} (${pct}%)`;
      document.getElementById('boss-num').textContent = this.score; goScreen('s-boss-result');
      setTimeout(()=>document.getElementById('boss-ring-fill').style.strokeDashoffset=339*(1-this.score/total),100);
      this.isBoss=false; DailyQuestSystem.update(); return;
    }
    let e='😔', t='Нужно повторить';
    if (pct>=80) { e='🏆'; t='Отлично!'; } else if (pct>=60) { e='👍'; t='Хорошо!'; }
    document.getElementById('res-emoji').textContent = e; document.getElementById('res-title').textContent = t;
    document.getElementById('res-sub').textContent = `${pct}% правильных`;
    document.getElementById('ring-num').textContent = this.score;
    document.getElementById('ring-denom').textContent = `из ${total}`;
    document.getElementById('res-c').textContent = this.score;
    document.getElementById('res-w').textContent = total-this.score;
    const xp = this.score*20 + (this.score===total?50:0);
    document.getElementById('res-xp').textContent = '+'+xp;
    this.saveLesson(this.curLesson, this.score, total);
    goScreen('s-result');
    setTimeout(()=>document.getElementById('ring-fill').style.strokeDashoffset=339*(1-this.score/total),100);
    DailyQuestSystem.update();
  },
  saveLesson(idx, sc, total) {
    const today = new Date().toISOString().slice(0,10);
    const key = getAllLessons()[idx]?.title || String(idx);
    userProgress.completedLessons[key] = { score:sc, total, date:today };
    userProgress.totalAnswered += total; userProgress.totalCorrect += sc;
    XPSystem.addXP(sc*20 + (sc===total?50:0));
    checkStreak(); saveProgress();
    if (!userProgress.completedLessons[key].chestGiven) {
      ChestSystem.give('achievement'); userProgress.completedLessons[key].chestGiven = true; saveProgress();
    }
  }
};

// ---------- RENDERING ----------
function goScreen(id) {
  if (id !== 's-quiz') {
    const qp = document.getElementById('quiz-professor');
    if (qp) qp.classList.add('hidden');
    ProfessorGeo.hide();
  }
  const hero = document.getElementById('hero-professor');
  if (hero) {
    if (id === 's-home') hero.classList.remove('hidden');
    else hero.classList.add('hidden');
  }
  const fab = document.getElementById('professor-fab');
  if (fab) {
    if (id === 's-home' || id === 's-profile') fab.classList.remove('hidden');
    else fab.classList.add('hidden');
  }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 's-home') renderHomePath();
  if (id === 's-profile') renderProfile();
}

function getPredictedGrade() {
  if (!userProgress.totalAnswered) return '—';
  const acc = userProgress.totalCorrect / userProgress.totalAnswered;
  if (acc >= 0.85) return '5'; if (acc >= 0.7) return '4'; if (acc >= 0.55) return '3'; return '2';
}

async function renderHomePath() {
  const container = document.getElementById('home-content');
  if (!lessonsLoaded.length) {
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">⏳ Загружаю...</div>';
    await loadAllLessons();
  }
  const all = getAllLessons();
  if (!all.length) { container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--danger)">⚠️ Ошибка загрузки</div>'; return; }

  const today = new Date().toISOString().slice(0,10);
  if (userProgress.professorGreetingDate !== today) {
    userProgress.professorGreetingDate = today; saveProgress();
    setTimeout(() => {
      ProfessorGeo.show("Привет! Готов продолжить подготовку? 🚀", 5000);
    }, 800);
  }

  const completedCount = Object.keys(userProgress.completedLessons).length;
  const totalCount = all.length;
  const pct = totalCount ? Math.round(completedCount/totalCount*100) : 0;
  const grade = getPredictedGrade();
  let html = `<div class="path-progress-card"><b>Прогноз ОГЭ</b><div style="font-size:42px;color:var(--gold)">${grade}</div>`;
  html += `<div style="font-size:11px;color:var(--muted)">🔥 ${userProgress.streak||0} дней подряд · ${getDaysUntilOGE()} дн. до ОГЭ</div></div>`;
  html += `<div class="path-progress-card"><div style="display:flex;justify-content:space-between"><span>Прогресс</span><span>${pct}%</span></div><div class="path-progress-bar"><div class="path-progress-fill" style="width:0%" data-target="${pct}%"></div></div></div>`;

  const nextIdx = all.findIndex((l,i) => !userProgress.completedLessons[l.title]);
  const nextLesson = nextIdx >= 0 ? all[nextIdx] : null;
  if (nextLesson) {
    html += `<div class="continue-card" onclick="QuestionSystem.start(${nextIdx})"><span>▶️</span><div><div class="continue-label">Продолжить</div><div>${nextLesson.title}</div></div></div>`;
  } else {
    html += `<div class="continue-card" onclick="QuestionSystem.startBoss()"><span>👑</span><div><div class="continue-label">Финальное испытание</div><div>Финальный босс</div></div></div>`;
  }
  container.innerHTML = html;
  setTimeout(() => container.querySelectorAll('.path-progress-fill[data-target]').forEach(f => f.style.width = f.dataset.target), 50);
  document.getElementById('home-streak').textContent = '🔥 ' + (userProgress.streak||0);
  document.getElementById('home-sublabel').textContent = `${completedCount}/${totalCount} тем`;
}

function renderProfile() {
  const container = document.getElementById('profile-content');
  const rank = userProgress.xp >= 5000 ? 'Мастер' : userProgress.xp >= 1000 ? 'Ученик' : 'Новичок';
  container.innerHTML = `<div class="profile-header-card"><div class="profile-avatar-big">🧑‍🎓</div><div><div class="profile-name-big">Ученик <span style="background:var(--primary);padding:2px 8px;border-radius:10px;font-size:12px">${rank}</span></div><div>⚡ Ур.${userProgress.level} · ${userProgress.xp} XP</div></div></div>`;
}

function getDaysUntilOGE() {
  const now = new Date(); const oge = new Date(now.getFullYear(), 5, 19);
  if (now > oge) oge.setFullYear(oge.getFullYear()+1);
  return Math.ceil((oge - now)/86400000);
}

loadProgress(() => { checkStreak(); renderHomePath(); DailyQuestSystem.update(); AchievementSystem.check(); });
</script>
