<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ГеоПро — Подготовка к ОГЭ</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --card2: #1c2333;
  --primary: #58a6ff;
  --primary2: #3fb950;
  --text: #f0f6fc;
  --muted: #8b949e;
  --danger: #f85149;
  --gold: #d29922;
  --border: #ffffff0c;
  --radius: 18px;
  --font-h: 'Unbounded', sans-serif;
  --font-b: 'Onest', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:var(--font-b); background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0;
  background: radial-gradient(circle at 15% 15%, #58a6ff14 0%, transparent 50%),
              radial-gradient(circle at 85% 85%, #3fb95010 0%, transparent 50%);
  pointer-events:none; z-index:0;
}
.screen { display:none; flex-direction:column; min-height:100vh; position:relative; z-index:1; }
.screen.active { display:flex; animation: fadeUp .3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.topbar {
  padding:16px 18px; display:flex; align-items:center; justify-content:space-between;
  background:#0f1620; border-bottom:1px solid var(--border); flex-shrink:0;
}
.avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:20px; }
.username { font-family:var(--font-h); font-size:13px; font-weight:700; }
.sublabel { font-size:10px; color:var(--muted); }
.streak { background:#f8514915; color:#f85149; font-weight:700; font-size:12px; padding:6px 12px; border-radius:20px; }
.scroll { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding-bottom:88px; }
.scroll::-webkit-scrollbar { width:3px; }
.scroll::-webkit-scrollbar-thumb { background:#ffffff15; border-radius:8px; }
.card-animate {
  opacity:0; transform: translateY(20px);
  animation: cardAppear 0.45s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
}
@keyframes cardAppear { to { opacity:1; transform:translateY(0); } }
.btn, .btn-full, .btn-next, .ans-btn, .continue-card, .modal-btn, button {
  transition: transform 0.12s ease, opacity 0.12s ease;
}
.btn:active, .btn-full:active, .btn-next:active, .ans-btn:active, .continue-card:active, .modal-btn:active, button:active {
  transform: scale(0.97) !important;
}
.path-progress-fill, .q-progress-fill { transition: width 0.8s cubic-bezier(0.2, 0.9, 0.3, 1); }
.task-check { display: inline-block; transition: transform 0.25s ease, color 0.25s ease; }
.task-check.done { color: var(--primary2) !important; animation: taskPop 0.35s ease; }
@keyframes taskPop { 0% { transform: scale(0.8); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
.toast-container {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none;
}
.toast {
  background: rgba(28, 35, 51, 0.92); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 12px 20px;
  border-radius: 18px; font-weight: 600; font-size: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.3s forwards;
  pointer-events: auto; max-width: 90vw; text-align: center;
}
.toast.xp { border-left: 3px solid var(--primary2); }
.toast.chest { border-left: 3px solid var(--gold); }
.toast.achievement { border-left: 3px solid #c084fc; }
.toast.streak { border-left: 3px solid #f97316; }
@keyframes toastIn { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-12px); } }
.ai-panel { background:linear-gradient(135deg,#0f1e35,#0d1f2d); border:1px solid #58a6ff30; border-radius:var(--radius); overflow:hidden; }
.ai-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:#58a6ff0a; border-bottom:1px solid #58a6ff20; cursor:pointer; }
.ai-header-left { display:flex; align-items:center; gap:10px; }
.ai-avatar { width:32px; height:32px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:16px; }
.ai-name { font-size:13px; font-weight:700; color:var(--primary); }
.ai-tagline { font-size:10px; color:var(--muted); }
.ai-toggle { font-size:18px; color:var(--muted); transition:transform .3s; }
.ai-toggle.open { transform:rotate(180deg); }
.ai-body { padding:14px; display:none; flex-direction:column; gap:10px; }
.ai-body.open { display:flex; animation: fadeUp .25s ease; }
.ai-prompts { display:flex; flex-wrap:wrap; gap:6px; }
.ai-prompt-btn { background:#58a6ff15; border:1px solid #58a6ff30; border-radius:20px; padding:6px 12px; font-size:11px; color:var(--primary); cursor:pointer; font-family:var(--font-b); transition:.15s; }
.ai-prompt-btn:active { background:#58a6ff30; }
.ai-messages { display:flex; flex-direction:column; gap:8px; max-height:220px; overflow-y:auto; padding-right:4px; }
.ai-messages::-webkit-scrollbar { width:2px; }
.ai-messages::-webkit-scrollbar-thumb { background:#ffffff15; }
.msg { padding:10px 12px; border-radius:12px; font-size:13px; line-height:1.55; max-width:92%; }
.msg.user { background:#58a6ff20; border:1px solid #58a6ff30; align-self:flex-end; color:var(--text); }
.msg.ai { background:var(--card); border:1px solid var(--border); align-self:flex-start; color:#c8d8e8; }
.msg.loading { color:var(--muted); font-style:italic; }
.ai-input-row { display:flex; gap:8px; align-items:flex-end; }
.ai-input { flex:1; background:var(--card); border:1px solid #58a6ff30; border-radius:12px; padding:10px 12px; color:var(--text); font-family:var(--font-b); font-size:13px; resize:none; min-height:40px; max-height:80px; outline:none; }
.ai-input:focus { border-color:#58a6ff60; }
.ai-input::placeholder { color:var(--muted); }
.ai-send { width:40px; height:40px; border-radius:12px; flex-shrink:0; background:linear-gradient(135deg,var(--primary),var(--primary2)); border:none; color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:transform .15s; }
.ai-send:active { transform:scale(.93); }
.ai-send:disabled { opacity:.5; cursor:default; }
.ai-context { font-size:10px; color:var(--muted); background:var(--card); border:1px solid var(--border); border-radius:8px; padding:4px 8px; }
.quiz-wrap { flex:1; padding:16px; display:flex; flex-direction:column; gap:14px; padding-bottom:24px; overflow-y:auto; }
.quiz-wrap::-webkit-scrollbar { width:3px; }
.q-header { display:flex; justify-content:space-between; align-items:center; }
.q-progress { height:4px; background:var(--card2); border-radius:8px; overflow:hidden; }
.q-progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); transition:width .4s ease; }
.q-card { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
.q-tag { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--primary); margin-bottom:10px; }
.q-text { font-size:15px; line-height:1.55; font-weight:500; }
.answers { display:flex; flex-direction:column; gap:8px; }
.ans-btn { background:var(--card2); border:1.5px solid var(--border); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; font-family:var(--font-b); font-size:13px; color:var(--text); transition:.15s; }
.ans-btn:active { transform:scale(.98); }
.ans-btn.correct { border-color:var(--primary2); background:rgba(63,185,80,.1); }
.ans-btn.wrong { border-color:var(--danger); background:rgba(248,81,73,.1); }
.ans-letter { width:26px; height:26px; border-radius:8px; background:#2a3a55; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; transition:.15s; }
.ans-btn.correct .ans-letter { background:var(--primary2); }
.ans-btn.wrong .ans-letter { background:var(--danger); }
.btn-next { width:100%; background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; border:none; border-radius:var(--radius); padding:16px; font-family:var(--font-h); font-size:13px; font-weight:700; cursor:pointer; display:none; transition:transform .15s; margin-top:4px; }
.btn-next.show { display:block; animation: fadeUp .3s ease; }
.btn-next:active { transform:scale(.97); }
.result-wrap { flex:1; padding:40px 24px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:16px; overflow-y:auto; padding-bottom:32px; }
.result-emoji { font-size:64px; animation: popIn .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }
.result-title { font-family:var(--font-h); font-size:22px; font-weight:800; letter-spacing:-.02em; }
.result-sub { font-size:14px; color:var(--muted); }
.ring-wrap { position:relative; width:130px; height:130px; }
.ring-wrap svg { transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:var(--card2); stroke-width:10; }
.ring-fill { fill:none; stroke:url(#rg); stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1s ease; }
.ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-num { font-family:var(--font-h); font-size:28px; font-weight:800; }
.ring-denom { font-size:12px; color:var(--muted); }
.res-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; }
.res-stat { background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px 8px; text-align:center; }
.res-num { font-family:var(--font-h); font-size:18px; font-weight:800; }
.res-num.g{color:var(--primary2)} .res-num.r{color:var(--danger)} .res-num.y{color:var(--gold)}
.res-label { font-size:10px; color:var(--muted); margin-top:3px; }
.res-btns { width:100%; display:flex; flex-direction:column; gap:8px; }
.btn-full { width:100%; padding:16px; border-radius:var(--radius); font-family:var(--font-h); font-size:13px; font-weight:700; cursor:pointer; transition:.15s; }
.btn-full:active { transform:scale(.97); }
.btn-full.primary { background:linear-gradient(135deg,var(--primary),var(--primary2)); color:#fff; border:none; }
.btn-full.sec { background:transparent; color:var(--muted); border:1px solid var(--border); }
.path-progress-card {
  background:var(--card2); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; margin-bottom:6px;
}
.path-progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.path-progress-label { font-size:13px; font-weight:600; }
.path-progress-pct { font-family:var(--font-h); font-size:16px; font-weight:800; color:var(--primary); }
.path-progress-bar { height:8px; background:#2d3a55; border-radius:8px; overflow:hidden; }
.path-progress-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--primary2)); border-radius:8px; transition:width .5s ease; }
.continue-card {
  background:linear-gradient(135deg,#1a3a5c,#0f2438); border:1px solid #58a6ff40; border-radius:var(--radius);
  padding:16px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:transform .15s;
}
.continue-card:active { transform:scale(.98); }
.continue-icon { font-size:32px; flex-shrink:0; }
.continue-label { font-size:10px; color:var(--primary); font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
.continue-title { font-size:15px; font-weight:700; margin-top:2px; }
.continue-arrow { font-size:20px; color:var(--primary); margin-left:auto; }
.path-node-row { display:flex; align-items:center; gap:14px; width:100%; }
.path-connector { width:3px; height:24px; margin:0 auto; }
.node-circle {
  width:56px; height:56px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:22px;
}
.node-circle.done { background:var(--primary2); border:2px solid var(--primary2); }
.node-circle.perfect { background:var(--gold); border:2px solid var(--gold); }
.node-circle.current { background:#f5a623; border:2px solid #f5a623; box-shadow:0 0 0 6px #f5a62320; animation: pulseNode 2s infinite; }
.node-circle.locked { background:var(--card2); border:2px solid var(--border); opacity:.4; }
@keyframes pulseNode { 0%,100%{box-shadow:0 0 0 6px #f5a62320} 50%{box-shadow:0 0 0 10px #f5a62308} }
.boss-node {
  width:72px; height:72px; border-radius:20px; flex-shrink:0;
  background:linear-gradient(135deg,#d29922,#b8860b); border:2px solid #d29922;
  display:flex; align-items:center; justify-content:center; font-size:30px;
}
.boss-node.locked { background:var(--card2); border-color:var(--border); opacity:.35; }
.profile-header-card { display:flex; align-items:center; gap:16px; padding:8px 0 4px; }
.profile-avatar-big { width:64px; height:64px; border-radius:20px; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
.profile-name-big { font-family:var(--font-h); font-size:17px; font-weight:800; }
.profile-level-big { font-size:12px; color:var(--primary); margin-top:3px; }
.profile-stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.profile-stat { background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px 6px; text-align:center; }
.profile-stat-num { font-family:var(--font-h); font-size:17px; font-weight:800; color:var(--primary); }
.profile-stat-label { font-size:9px; color:var(--muted); margin-top:3px; }
.badges-grid-profile { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.badge-item-p { background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px 6px; text-align:center; }
.badge-item-p.locked { opacity:.3; }
.badge-icon-p { font-size:22px; margin-bottom:4px; }
.badge-name-p { font-size:8px; color:var(--muted); line-height:1.3; }
.sub-status-card { background:var(--card2); border:1px solid var(--border); border-radius:var(--radius); padding:16px; display:flex; align-items:center; gap:12px; }
.sub-status-card.active { border-color:#3fb95040; background:linear-gradient(135deg,#0f2318,#0d1f17); }
@keyframes chestGlow {
  0% { box-shadow: 0 0 5px #d29922; }
  50% { box-shadow: 0 0 20px #d29922; }
  100% { box-shadow: 0 0 5px #d29922; }
}
@keyframes chestPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}
/* Анимация открытия сундука */
.chest-open-anim {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 20px 0;
}
.chest-body {
  font-size: 64px;
  z-index: 2;
}
.chest-lid {
  position: absolute;
  top: -32px;
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
  width: 60px;
  height: 30px;
  background: linear-gradient(145deg, #d29922, #b8860b);
  border-radius: 10px 10px 0 0;
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
  transform-origin: bottom center;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 3;
}
.chest-lid.open {
  transform: translateX(-50%) rotate(-120deg);
}
.particle {
  position: absolute;
  top: 30px;
  left: 50%;
  width: 8px;
  height: 8px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  z-index: 1;
  animation: particleFly 0.8s ease-out forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(0); }
}
.professor-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeInOverlay 0.25s ease;
}
.professor-modal-card {
  background: var(--card2); border: 1px solid var(--border); border-radius: 24px 24px 0 0;
  padding: 24px 20px 32px; width: 100%; max-width: 420px; text-align: center;
  animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
  display: flex; flex-direction: column; gap: 16px;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
}
@keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.professor-avatar {
  width: 64px; height: 64px; margin: 0 auto; background: transparent; border-radius: 24px;
  display: flex; align-items: center; justify-content: center; font-size: 34px; overflow: hidden;
}
.professor-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 24px; }
.professor-message { font-size: 15px; line-height: 1.6; color: var(--text); padding: 0 8px; }
.professor-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.professor-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  font-family: var(--font-h); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: transform 0.12s ease, background 0.2s ease; border: none;
}
.professor-btn:active { transform: scale(0.97); }
.professor-btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; }
.professor-btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.professor-btn:disabled { opacity: 0.4; pointer-events: none; }

/* Виджет Профессора */
.prof-geo-widget {
  position: fixed; bottom: 24px; right: 24px; z-index: 950;
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
}
.prof-geo-btn {
  width: 64px; height: 64px; border-radius: 50%; background-color: #1e2a3a;
  background-image: url('https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_default.png');
  background-size: cover; background-position: center;
  border: 2px solid var(--gold);
  box-shadow: 0 0 12px rgba(210, 153, 34, 0.4), 0 4px 12px rgba(0,0,0,0.3);
  cursor: pointer; transition: transform 0.3s ease, box-shadow 0.3s ease, background-image 0.2s ease;
  pointer-events: auto; will-change: transform;
  animation: subtlePulse 3s infinite ease-in-out, idleBreathing 4s infinite ease-in-out;
}
.prof-geo-btn:active { transform: scale(0.95); box-shadow: 0 0 18px rgba(210, 153, 34, 0.7), 0 2px 8px rgba(0,0,0,0.3); }
@keyframes subtlePulse {
  0% { box-shadow: 0 0 8px rgba(210,153,34,0.3), 0 4px 12px rgba(0,0,0,0.3); }
  50% { box-shadow: 0 0 16px rgba(210,153,34,0.6), 0 4px 12px rgba(0,0,0,0.3); }
  100% { box-shadow: 0 0 8px rgba(210,153,34,0.3), 0 4px 12px rgba(0,0,0,0.3); }
}
@keyframes idleBreathing {
  0%, 100% { transform: scale(1) translateY(0); }
  50% { transform: scale(1.03) translateY(-1px); }
}
.prof-geo-btn.talking { transform: translateY(-3px) rotate(-2deg); animation: none; }
.prof-geo-btn.correct-bounce { animation: correctBounce 0.6s ease-out; }
.prof-geo-btn.wrong-tilt { animation: wrongTilt 0.6s ease-out; }
.prof-geo-btn.hint-explain { animation: hintExplain 0.8s ease-in-out; }
.prof-geo-btn.chest-jump { animation: chestJump 0.7s ease-out; }
.prof-geo-btn.levelup-glow { animation: levelUpGlow 0.8s ease-out; }
@keyframes correctBounce {
  0% { transform: scale(1); } 30% { transform: scale(1.1) translateY(-8px); }
  60% { transform: scale(0.95) translateY(0); } 100% { transform: scale(1); }
}
@keyframes wrongTilt {
  0% { transform: rotate(0deg); } 25% { transform: rotate(-6deg); }
  75% { transform: rotate(2deg); } 100% { transform: rotate(0deg); }
}
@keyframes hintExplain {
  0% { transform: rotate(0deg); } 25% { transform: rotate(-4deg); }
  75% { transform: rotate(4deg); } 100% { transform: rotate(0deg); }
}
@keyframes chestJump {
  0% { transform: scale(1); } 30% { transform: scale(1.15) translateY(-10px); }
  60% { transform: scale(0.95) translateY(0); } 100% { transform: scale(1); }
}
@keyframes levelUpGlow {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.12); filter: brightness(1.3); }
  100% { transform: scale(1); filter: brightness(1); }
}
.prof-geo-speech {
  position: relative; background: var(--card2); border: 1px solid var(--border);
  border-radius: 18px; padding: 14px 16px; max-width: 240px; font-size: 13px;
  line-height: 1.5; color: var(--text); box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  opacity: 0; transform: translateY(10px); transition: opacity 0.35s ease, transform 0.35s ease;
  pointer-events: none;
}
.prof-geo-speech.visible { opacity: 1; transform: translateY(0); }
.prof-geo-speech::after {

</head>
<body>

<div id="professor-geo-widget" class="prof-geo-widget">

<script>
// ========== КОНСТАНТЫ ==========
const PROF_IMAGES = {
  default: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_default.png',
  greeting: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_happy.png',
  correct: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_happy.png',
  wrong: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_sad.png',
  hint: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_hint.png',
  chest: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_happy.png',
  levelup: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_happy.png',
  chat: 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/images/professor_chat_avatar.png'
};
const ProfessorMessages = {
  greetingMessages: ["Здравствуйте!<br>Сегодня отличный день для новых открытий 🌍","Привет! Давай покорим ещё одну тему! 🚀","Добрый день! Готов к географии?"],
  correctAnswerMessages: ["Верно! Так держать! 🎉","Отлично! Ты настоящий географ!","Молодец! Всё правильно."],
  wrongAnswerMessages: ["Ничего, ошибка — это шаг к знанию 🤔","Подумай ещё, ты запомнишь!","Не страшно, в следующий раз получится."],
  hintMessages: ["Давай подумаем вместе...","Обрати внимание на ключевые слова.","Попробуй исключить неверные варианты."],
  levelUpMessages: ["Новый уровень! 🌟","Растёшь как настоящий исследователь!","Ещё одна ступенька к мастерству."],
  streakMessages: ["Ого, {n} дней подряд! 🔥","Серия из {n} дней! Впечатляет!"],
  chestMessages: ["Сундук открыт! Держи награду 🎁","Сокровища географа твои!"],
  finishTopicMessages: ["Тема пройдена! 💪","Отлично! Ещё один раздел позади."],
  dailyTaskMessages: ["Ежедневное задание выполнено! 🎯","Ты справился с задачей дня!"]
};

// ========== ВИДЖЕТ ПРОФЕССОРА ==========
const ProfessorGeoWidget = {
  greetShownToday: false, timer: null, lastIndexes: {}, currentEmotion: 'default',
  init() {
    const today = new Date().toISOString().slice(0,10);
    this.greetShownToday = (userProgress.professorGreetingDate === today);
    if (!this.greetShownToday) {
      setTimeout(() => this.showGreeting(), 1200);
      userProgress.professorGreetingDate = today; saveProgress();
    }
  },
  getRandomIndex(arr, type) {
    if (!this.lastIndexes[type]) this.lastIndexes[type] = -1;
    if (arr.length === 1) return 0;
    let idx = Math.floor(Math.random() * arr.length);
    if (arr.length > 1 && idx === this.lastIndexes[type]) idx = (idx + 1) % arr.length;
    this.lastIndexes[type] = idx; return idx;
  },
  setEmotion(type) {
    const btn = document.getElementById('prof-geo-btn');
    if (!btn) return;
    btn.style.backgroundImage = `url('${PROF_IMAGES[type] || PROF_IMAGES.default}')`;
    this.currentEmotion = type;
  },
  resetEmotion() { this.setEmotion('default'); },
  triggerAnimation(type) {
    const btn = document.getElementById('prof-geo-btn');
    if (!btn) return;
    const animClass = { correct:'correct-bounce', wrong:'wrong-tilt', hint:'hint-explain', chest:'chest-jump', levelup:'levelup-glow' }[type]||null;
    if (animClass) { btn.classList.add(animClass); setTimeout(() => btn.classList.remove(animClass), 1000); }
  },
  showGreeting() { this.showMessage(this.getRandomIndex(ProfessorMessages.greetingMessages,'greeting'), 5000, 'greeting'); },
  showCorrectAnswer() { this.showMessage(this.getRandomIndex(ProfessorMessages.correctAnswerMessages,'correct'), 3500, 'correct'); },
  showWrongAnswer() { this.showMessage(this.getRandomIndex(ProfessorMessages.wrongAnswerMessages,'wrong'), 4000, 'wrong'); },
  showHint() { this.showMessage(this.getRandomIndex(ProfessorMessages.hintMessages,'hint'), 4000, 'hint'); },
  showLevelUp() { this.showMessage(this.getRandomIndex(ProfessorMessages.levelUpMessages,'levelup'), 4000, 'levelup'); },
  showStreak(streak) { this.showMessage(this.getRandomIndex(ProfessorMessages.streakMessages,'streak').replace('{n}',streak), 4000, 'levelup'); },
  showChest() { this.showMessage(this.getRandomIndex(ProfessorMessages.chestMessages,'chest'), 4000, 'chest'); },
  showFinishTopic() { this.showMessage(this.getRandomIndex(ProfessorMessages.finishTopicMessages,'finish'), 4000, 'levelup'); },
  showDailyTask() { this.showMessage(this.getRandomIndex(ProfessorMessages.dailyTaskMessages,'daily'), 4000, 'levelup'); },
  showMessage(text, duration=4000, eventType=null) {
    const speech = document.getElementById('prof-geo-speech'), btn = document.getElementById('prof-geo-btn');
    if (!speech || !btn) return;
    this.hideSpeech();
    setTimeout(() => {
      if (eventType) { this.setEmotion(eventType); this.triggerAnimation(eventType); }
      btn.classList.add('talking'); speech.innerHTML = text; speech.classList.add('visible');
      if (this.timer) clearTimeout(this.timer);
      this.timer = setTimeout(() => { speech.classList.remove('visible'); btn.classList.remove('talking'); this.resetEmotion(); }, duration);
    }, 60);
  },
  hideSpeech() {
    const speech = document.getElementById('prof-geo-speech'), btn = document.getElementById('prof-geo-btn');
    if (speech) speech.classList.remove('visible');
    if (btn) btn.classList.remove('talking');
    if (this.timer) clearTimeout(this.timer);
  }
};

// ========== ДАННЫЕ И ЛОГИКА ==========
const PROXY = 'https://yandex-proxy.mixakuznetsov15.workers.dev';
const GITHUB_RAW = 'https://raw.githubusercontent.com/mixakuznetsov15-droid/ogebot/main/theory/';
const QUESTIONS_FILES = [
  { key:'topo', title:'🗺 Топографические карты', file:'questions_topo.json', tasks:'Задания 1-4' },
  { key:'climat', title:'📊 Климат и климатограммы', file:'questions_climat.json', tasks:'Задания 7-8' },
  { key:'nature_russia', title:'🌋 Природа России', file:'questions_nature_russia.json', tasks:'Задания 13-16'},
  { key:'ecology', title:'🌱 Экология', file:'questions_ecology.json', tasks:'Задание 15' },
  { key:'timezone', title:'🕐 Часовые пояса', file:'questions_timezone.json', tasks:'Задание 17' },
  { key:'world', title:'🌍 Страны и материки', file:'questions_world.json', tasks:'Задания 20-21'},
  { key:'regions', title:'📍 Регионы России', file:'questions_regions.json', tasks:'Задания 20-21'},
  { key:'litosphere', title:'⛰ Литосфера и рельеф', file:'questions_litosphere.json', tasks:'Задание 22' },
  { key:'hydro', title:'💧 Гидросфера', file:'questions_hydro.json', tasks:'Задание 22' },
  { key:'population', title:'👥 Население России', file:'questions_population.json', tasks:'Задания 23-25'},
  { key:'geopos', title:'📍 Геогр. положение России', file:'questions_geopos.json', tasks:'Задание 26' },
  { key:'economy', title:'🏭 Хозяйство России', file:'questions_economy.json', tasks:'Задание 27' },
  { key:'zones', title:'🌲 Природные зоны', file:'questions_zones.json', tasks:'Задание 28' },
];
const HINTS_DB = {
  topo: ["Давай подумаем...","Обрати внимание на масштаб...","Мысленно проложи маршрут."],
  climat: ["Посмотри на график...","Определи самый тёплый месяц...","Сравни с известными типами."],
  nature_russia: ["Вспомни природные зоны...","Какие факторы влияют...","Сопоставь описание."],
  ecology: ["Как человек влияет на природу?","Меры по снижению воздействия.","Примеры рационального использования."],
  timezone: ["Вспомни разницу во времени.","Карта часовых поясов.","Прибавь или вычти часы."],
  world: ["Особенности положения стран.","Природные условия региона.","Сравни с соседями."],
  regions: ["Экономическая специализация.","Природные ресурсы и климат.","Какие отрасли развиты?"],
  litosphere: ["Какие формы рельефа бывают?","Внутренние и внешние силы.","Сопоставь с конкретной формой."],
  hydro: ["Водные объекты гидросферы.","Режим питания рек.","Факторы полноводности."],
  population: ["Показатели населения.","Плотность и естественный прирост.","Факторы размещения."],
  geopos: ["С какими странами граничит?","Преимущества положения.","Моря России."],
  economy: ["Отрасли хозяйства.","Факторы размещения.","Необходимые ресурсы."],
  zones: ["Природные зоны России.","Изменение с севера на юг.","Почвы и растительность."]
};
function getProfessorHint(topicKey, level) { const h = HINTS_DB[topicKey]||HINTS_DB.topo; return h[Math.min(level, h.length-1)]; }

var lessonsLoaded = [];
async function fetchJSON(filename) {
  var r = await fetch(GITHUB_RAW+filename+'?nocache='+Date.now());
  if (!r.ok) throw new Error('Ошибка загрузки: '+filename);
  return r.json();
}
async function loadAllLessons() {
  lessonsLoaded = [];
  for (var f of QUESTIONS_FILES) {
    try {
      var data = await fetchJSON(f.file);
      var qs = (Array.isArray(data)?data:[]).filter(q=>q.tag&&q.text&&q.answers);
      if (qs.length) lessonsLoaded.push({...f, questions:qs});
    } catch(e) { console.warn(e); }
  }
  return lessonsLoaded;
}
function getAllLessons() { return lessonsLoaded.length?lessonsLoaded:[]; }

const tgApp = window.Telegram?.WebApp;
const isTelegram = !!tgApp?.initData;
if (isTelegram) { tgApp.ready(); tgApp.expand(); }

function showToastMsg(text, type='info') {
  if (window._suppressToast) return;
  var c = document.getElementById('toast-container');
  var t = document.createElement('div'); t.className='toast '+type; t.textContent=text;
  c.appendChild(t); setTimeout(()=>{ if(t.parentNode) t.remove(); }, 2600);
}
function animateCards(container) {
  container.querySelectorAll('.path-progress-card,.continue-card,.profile-header-card,.profile-stats-grid>div,.badge-item-p,.sub-status-card,.profile-stat,.badges-grid-profile>div')
  .forEach((el,i)=>{ el.classList.add('card-animate'); el.style.animationDelay=(i*0.05)+'s'; });
}

// ── XPSystem ──
var XPSystem = {
  addXP(amount, silent) {
    if (amount<=0) return;
    if (userProgress.doubleXPUntil && new Date(userProgress.doubleXPUntil)>new Date()) amount*=2;
    var oldLvl = userProgress.level;
    userProgress.xp += amount;
    userProgress.level = Math.floor(userProgress.xp/200)+1;
    saveProgress();
    if (!silent) showToastMsg('⚡ +'+amount+' XP','xp');
    if (userProgress.level>oldLvl) ProfessorGeoWidget.showLevelUp();
    AchievementSystem.check();
    DailyQuestSystem.incrementCounters(0, amount);
  }
};

// ── DailyQuestSystem ──
var DailyQuestSystem = {
  update() {
    var today = new Date().toISOString().slice(0,10);
    if (userProgress.dailyTasksDate!==today) {
      userProgress.dailyTasksDate=today;
      userProgress.dailyTasks={solve10:false,earn50XP:false,loginToday:true};
      userProgress.dailyTasksCollected={solve10:false,earn50XP:false,loginToday:false};
      userProgress.allDailyTasksDone=false; saveProgress();
    }
    var tasks=userProgress.dailyTasks, col=userProgress.dailyTasksCollected;
    var dQ=userProgress.dailyQuestions||0, dXP=userProgress.dailyXP||0, done=false;
    if (dQ>=10&&!tasks.solve10) { tasks.solve10=true; if(!col.solve10){col.solve10=true;XPSystem.addXP(20);done=true;} }
    if (dXP>=50&&!tasks.earn50XP) { tasks.earn50XP=true; if(!col.earn50XP){col.earn50XP=true;XPSystem.addXP(20);done=true;} }
    if (!tasks.loginToday) { tasks.loginToday=true; if(!col.loginToday){col.loginToday=true;XPSystem.addXP(20);done=true;} }
    if (tasks.solve10&&tasks.earn50XP&&tasks.loginToday&&!userProgress.allDailyTasksDone) {
      userProgress.allDailyTasksDone=true; XPSystem.addXP(100); ChestSystem.give('achievement');
    }
    if (done) ProfessorGeoWidget.showDailyTask();
    saveProgress();
  },
  incrementCounters(q, xp) {
    var today = new Date().toISOString().slice(0,10);
    if (userProgress.dailyTasksDate!==today) { userProgress.dailyQuestions=0; userProgress.dailyXP=0; }
    userProgress.dailyQuestions += q; userProgress.dailyXP += xp;
    saveProgress(); this.update();
  }
};

// ── Achievements ──
var ACHIEVEMENTS_LIST = [
  { id:'first_login', icon:'🏆', title:'Первый вход', cond:()=>true },
  { id:'first_lesson', icon:'🏆', title:'Первый урок', cond:()=>userProgress.totalAnswered>0 },
  { id:'first_theme', icon:'🏆', title:'Первая завершённая тема', cond:()=>Object.keys(userProgress.completedLessons).length>0 },
  { id:'streak3', icon:'🔥', title:'3 дня подряд', cond:()=>(userProgress.streak||0)>=3 },
  { id:'streak7', icon:'🔥', title:'7 дней подряд', cond:()=>(userProgress.streak||0)>=7 },
  { id:'solve50', icon:'📚', title:'50 вопросов', cond:()=>userProgress.totalAnswered>=50, max:50, progress:()=>Math.min(userProgress.totalAnswered,50) },
  { id:'xp500', icon:'⭐', title:'500 XP', cond:()=>userProgress.xp>=500, max:500, progress:()=>Math.min(userProgress.xp,500) }
];
var AchievementSystem = {
  check() {
    if (!userProgress.achievements) userProgress.achievements={};
    var now = new Date().toISOString();
    ACHIEVEMENTS_LIST.forEach(a=>{
      var rec=userProgress.achievements[a.id]||{};
      var unlocked = a.cond();
      var prog = a.progress?a.progress():(unlocked?(a.max||1):0);
      if (!rec.unlocked) rec={progress:prog, unlocked, date:unlocked?now:null, chestGiven:false};
      else rec.progress=prog;
      if (unlocked && !rec.unlocked) {
        rec.unlocked=true; rec.date=now;
        if (!rec.chestGiven) { ChestSystem.give('achievement'); rec.chestGiven=true; }
      }
      userProgress.achievements[a.id]=rec;
    });
    saveProgress();
  }
};

// ── Сундуки ──
var ChestSystem = {
  isOpening: false,
  rewardPool: [
    { type:'xp', value:20, label:'+20 XP' },
    { type:'xp', value:50, label:'+50 XP' },
    { type:'xp', value:100, label:'+100 XP' },
    { type:'boost_x2', duration:15, label:'Бустер x2 XP' },
    { type:'free_hint', value:1, label:'Бесплатная подсказка' }
  ],
  give(type) {
    if (!userProgress.chests) userProgress.chests=[];
    userProgress.chests.push({type:type||'daily'});
    saveProgress();
  },
  giveDaily() {
    var today = new Date().toISOString().slice(0,10);
    if (userProgress.lastDailyChestDate===today) return;
    userProgress.lastDailyChestDate=today; this.give('daily');
  },
  giveStreak() {
    var s=userProgress.streak||0, given=userProgress.streakChestsGiven||{};
    [3,7,14,30].forEach(t=>{ if(s>=t&&!given[t]){ this.give('streak'); given[t]=true; ProfessorGeoWidget.showStreak(s); } });
    userProgress.streakChestsGiven=given; saveProgress();
  },
  open() {
    if (this.isOpening || !userProgress.chests||!userProgress.chests.length) return;
    this.isOpening = true;
    var chest = userProgress.chests.shift(); saveProgress();
    var self = this;
    window._suppressToast = true; // отключаем системные тосты
    showChestOpeningAnimation(()=>{
      var reward = self.getRandomReward();
      self.applyReward(reward, true); // silent
      self.showRewardModal(reward);
      self.isOpening = false;
      window._suppressToast = false;
    });
  },
  getRandomReward() { return this.rewardPool[Math.floor(Math.random()*this.rewardPool.length)]; },
  applyReward(reward, silent) {
    switch(reward.type) {
      case 'xp': XPSystem.addXP(reward.value, silent); break;
      case 'boost_x2': userProgress.doubleXPUntil = new Date(Date.now()+reward.duration*60000).toISOString(); saveProgress(); break;
      case 'free_hint': userProgress.freeHints = (userProgress.freeHints||0)+1; saveProgress(); break;
    }
  },
  showRewardModal(reward) {
    var c = document.getElementById('modal-container');
    c.innerHTML = `<div class="modal-overlay" id="reward-modal"><div class="modal-card" style="background:var(--card2);border:1px solid var(--border);border-radius:24px;padding:24px;text-align:center;max-width:320px;margin:auto;animation:slideUp .3s ease;">
      <div style="font-size:48px;">🎉</div>
      <div style="font-size:22px;font-weight:800;margin:12px 0;">Поздравляем!</div>
      <div style="font-size:28px;color:var(--gold);font-weight:700;">${reward.label}</div>
      <button class="modal-btn" onclick="ChestSystem.closeRewardModal()" style="margin-top:20px;background:var(--primary);color:#fff;border:none;border-radius:14px;padding:14px;font-family:var(--font-b);font-size:14px;font-weight:700;cursor:pointer;width:100%;">Продолжить</button>
    </div></div>`;
  },
  closeRewardModal() {
    document.getElementById('modal-container').innerHTML='';
    renderProfile();
  }
};
function showChestOpeningAnimation(cb) {
  var c = document.getElementById('modal-container');
  var p = '';
  for (var i=0;i<12;i++) {
    var a = (i/12)*Math.PI*2;
    p += `<div class="particle" style="--x:${Math.cos(a)*40}px;--y:${Math.sin(a)*40}px;animation-delay:${i*0.03}s"></div>`;
  }
  c.innerHTML = `<div class="modal-overlay" id="chest-opening"><div class="modal-card" style="background:transparent;box-shadow:none;border:none;display:flex;align-items:center;justify-content:center;">
    <div class="chest-open-anim"><div class="chest-body">🎁</div><div class="chest-lid" id="chestLid"></div>${p}</div>
  </div></div>`;
  setTimeout(()=>{ var lid=document.getElementById('chestLid'); if(lid) lid.classList.add('open'); }, 300);
  setTimeout(()=>{ c.innerHTML=''; if(cb) cb(); }, 1300);
}

// ── ProfessorModal ──
var ProfessorModal = {
  level:0, key:'',
  openHint(key) { this.key=key; this.level=0; ProfessorGeoWidget.showHint(); this._show(getProfessorHint(key,0), [
    { text:'Закрыть', cls:'professor-btn-secondary', onClick:()=>this.close() },
    { text:'Ещё подсказка', cls:'professor-btn-primary', onClick:()=>this.nextHint() }
  ]);},
  nextHint() { this.level++; if(this.level>2) this.level=2;
    var btns = [{ text:'Закрыть', cls:'professor-btn-secondary', onClick:()=>this.close() }];
    if (this.level<2) btns.push({ text:'Ещё подсказка', cls:'professor-btn-primary', onClick:()=>this.nextHint() });
    else btns.push({ text:'Подсказок больше нет', cls:'professor-btn-primary', disabled:true });
    this._show(getProfessorHint(this.key, this.level), btns);
  },
  _show(msg, btns) {
    var c = document.getElementById('professor-modal-container');
    c.innerHTML = `<div class="professor-modal-overlay" id="prof-overlay"><div class="professor-modal-card">
      <div class="professor-avatar"><img src="${PROF_IMAGES.chat}" alt="Профессор"></div>
      <div class="professor-message">${msg}</div>
      <div class="professor-actions">${btns.map(b=>`<button class="professor-btn ${b.cls}" ${b.disabled?'disabled':''}>${b.text}</button>`).join('')}</div>
    </div></div>`;
    var ov = document.getElementById('prof-overlay');
    [...ov.querySelectorAll('.professor-btn')].forEach((b,i)=>{ if(btns[i].onClick) b.addEventListener('click', btns[i].onClick); });
    ov.addEventListener('click', e=>{ if(e.target===ov) this.close(); });
  },
  close() { document.getElementById('professor-modal-container').innerHTML=''; }
};

// ── QuestionSystem ──
var QuestionSystem = {
  curQ:0, score:0, answered:false, shuffled:[], curLesson:0, lives:3, hintUsed:false, isBossMode:false,
  start(idx) {
    var all = getAllLessons(); this.curLesson=idx; this.shuffled=all[idx].questions;
    this.curQ=0; this.score=0; this.answered=false; this.lives=3; this.hintUsed=false; this.isBossMode=false;
    goScreen('s-quiz'); this.renderQ();
  },
  startBoss() {
    var allQs = []; getAllLessons().forEach(l=>{ if(l.questions) allQs=allQs.concat(l.questions); });
    allQs = allQs.sort(()=>Math.random()-0.5).slice(0,30);
    this.isBossMode=true; this.shuffled=allQs; this.curLesson=-1;
    this.curQ=0; this.score=0; this.answered=false; this.lives=999; this.hintUsed=false;
    goScreen('s-quiz'); this.renderQ();
  },
  replay() { if(this.isBossMode||this.curLesson<0) this.startBoss(); else this.start(this.curLesson); },
  renderQ() {
    var q = this.shuffled[this.curQ], title = this.getTopicTitle();
    this.answered=false; this.hintUsed=false;
    document.getElementById('quiz-topic-lbl').textContent=title;
    document.getElementById('lesson-badge').textContent=`${title} · Вопрос ${this.curQ+1}/${this.shuffled.length}`;
    document.getElementById('quiz-counter').textContent=`${this.curQ+1}/${this.shuffled.length}`;
    document.getElementById('qpf').style.width=`${(this.curQ/this.shuffled.length)*100}%`;
    document.getElementById('q-tag').textContent=q.tag;
    document.getElementById('q-text').textContent=q.text;
    var btnHint = document.getElementById('btn-hint');
    btnHint.style.display='flex'; btnHint.disabled=false;
    document.getElementById('lives-row').innerHTML = Array.from({length:3},(_,i)=>`<span>${i<this.lives?'❤️':'🖤'}</span>`).join('');
    var next = document.getElementById('btn-next'); next.classList.remove('show');
    next.textContent = this.curQ<this.shuffled.length-1?'Следующий вопрос →':'Посмотреть результат →';
    var ans = document.getElementById('answers'); ans.innerHTML='';
    ['А','Б','В','Г'].forEach((l,i)=>{
      var b = document.createElement('button'); b.className='ans-btn';
      b.innerHTML=`<div class="ans-letter">${l}</div><span>${q.answers[i]}</span>`;
      b.onclick=()=>this.selectAns(i, q.correct);
      ans.appendChild(b);
    });
  },
  getTopicTitle() { return this.isBossMode?'Финальный босс':(getAllLessons()[this.curLesson]?.title||'Тренировка'); },
  getTopicKey() { return this.isBossMode?'topo':(getAllLessons()[this.curLesson]?.key||'topo'); },
  selectAns(idx, correct) {
    if (this.answered) return; this.answered=true;
    if (idx===correct && isTelegram && tgApp.HapticFeedback) tgApp.HapticFeedback.notificationOccurred('success');
    var btns = document.querySelectorAll('.ans-btn');
    btns[idx].classList.add(idx===correct?'correct':'wrong');
    if (idx!==correct) { btns[correct].classList.add('correct'); this.lives--; }
    if (idx===correct) { this.score++; XPSystem.addXP(10); }
    document.getElementById('btn-hint').style.display='none';
    document.getElementById('lives-row').innerHTML = Array.from({length:3},(_,i)=>`<span>${i<this.lives?'❤️':'🖤'}</span>`).join('');
    if (idx===correct) ProfessorGeoWidget.showCorrectAnswer(); else ProfessorGeoWidget.showWrongAnswer();
    var next = document.getElementById('btn-next'); next.classList.add('show');
    if (this.lives<=0) next.textContent='😔 Жизни кончились — попробуй ещё раз';
    DailyQuestSystem.incrementCounters(1,0);
  },
  next() { this.curQ++; if(this.curQ>=this.shuffled.length) this.showResult(); else this.renderQ(); },
  showResult() {
    var total=this.shuffled.length, pct=Math.round(this.score/total*100);
    if (this.isBossMode) {
      userProgress.bossCompleted=true; saveProgress();
      document.getElementById('boss-sub').textContent=`${this.score}/${total} (${pct}%)`;
      document.getElementById('boss-num').textContent=this.score;
      goScreen('s-boss-result');
      setTimeout(()=>document.getElementById('boss-ring-fill').style.strokeDashoffset=339*(1-this.score/total),100);
      this.isBossMode=false; DailyQuestSystem.update(); return;
    }
    var e='😔', t='Нужно повторить';
    if (pct>=80) { e='🏆'; t='Отлично!'; } else if (pct>=60) { e='👍'; t='Хорошо!'; }
    document.getElementById('res-emoji').textContent=e;
    document.getElementById('res-title').textContent=t;
    document.getElementById('res-sub').textContent=`${pct}% правильных`;
    document.getElementById('ring-num').textContent=this.score;
    document.getElementById('res-c').textContent=this.score;
    document.getElementById('res-w').textContent=total-this.score;
    var xp=this.score*20+(this.score===total?50:0);
    document.getElementById('res-xp').textContent='+'+xp;
    this.saveLesson(this.curLesson, this.score, total);
    goScreen('s-result');
    setTimeout(()=>document.getElementById('ring-fill').style.strokeDashoffset=339*(1-this.score/total),100);
    DailyQuestSystem.update();
  },
  saveLesson(idx, sc, total) {
    var today = new Date().toISOString().slice(0,10);
    var all = getAllLessons(), key = all[idx]?.title||String(idx);
    var wasNew = !userProgress.completedLessons[key];
    userProgress.completedLessons[key] = { score:sc, total, date:today };
    userProgress.totalAnswered += total; userProgress.totalCorrect += sc;
    XPSystem.addXP(sc*20+(sc===total?50:0));
    checkStreak(); saveProgress();
    if (!userProgress.chests) userProgress.chests=[];
    if (!userProgress.completedLessons[key].chestGiven) {
      ChestSystem.give('achievement'); userProgress.completedLessons[key].chestGiven=true; saveProgress();
    }
    if (wasNew) ProfessorGeoWidget.showFinishTopic();
  },
  getHint() { if (this.hintUsed) return; this.hintUsed=true; ProfessorModal.openHint(this.getTopicKey()); }
};

// ── Home & Profile ──
function getRank(xp) { return xp>=10000?'Легенда':xp>=5000?'Мастер':xp>=3000?'Эксперт':xp>=500?'Ученик':'Новичок'; }
function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if (id==='s-home') renderHomePath();
  if (id==='s-profile') renderProfile();
}
function getDaysUntilOGE() { var d=new Date(); d.setHours(0,0,0,0); var oge=new Date(d.getFullYear(),5,19); if (d>oge) oge.setFullYear(oge.getFullYear()+1); return Math.ceil((oge-d)/86400000); }
function getPredictedGrade() { if (!userProgress.totalAnswered) return '—'; var a=userProgress.totalCorrect/userProgress.totalAnswered; return a>=0.85?'5':a>=0.7?'4':a>=0.55?'3':'2'; }

async function renderHomePath() {
  var c = document.getElementById('home-content');
  if (!lessonsLoaded.length) { c.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">⏳ Загружаю...</div>'; await loadAllLessons(); }
  var all = getAllLessons(); if (!all.length) { c.innerHTML='<div style="padding:40px;color:var(--danger)">⚠️ Ошибка загрузки</div>'; return; }
  ProfessorGeoWidget.init();
  var doneCount = Object.keys(userProgress.completedLessons).length;
  var pct = Math.round(doneCount/all.length*100);
  var allDone = doneCount>=all.length;
  var grade = getPredictedGrade();
  var streak = userProgress.streak||0;
  var days = getDaysUntilOGE();
  var html = `<div class="path-progress-card"><b>Прогноз ОГЭ</b><div style="font-size:42px;color:var(--gold)">${grade}</div><div style="font-size:11px;color:var(--muted)">🔥 ${streak} дней · ${days} дн. до ОГЭ</div></div>`;
  html += `<div class="path-progress-card"><div class="path-progress-top"><span>Прогресс</span><span>${pct}%</span></div><div class="path-progress-bar"><div class="path-progress-fill" style="width:0%" data-target="${pct}%"></div></div></div>`;
  DailyQuestSystem.update();
  var tasks = userProgress.dailyTasks||{}, dQ=userProgress.dailyQuestions||0, dXP=userProgress.dailyXP||0;
  html += `<div class="path-progress-card"><div style="font-weight:700;margin-bottom:8px;">🎯 Ежедневные задания</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:6px;font-size:13px">`;
  html += `<div><span class="task-check${tasks.solve10?' done':''}" style="color:${tasks.solve10?'var(--primary2)':'var(--muted)'}">${tasks.solve10?'✅':'⬜'}</span> Решить 10 вопросов <span style="float:right;font-size:11px;color:var(--muted)">${Math.min(dQ,10)}/10</span></div>`;
  html += `<div><span class="task-check${tasks.earn50XP?' done':''}" style="color:${tasks.earn50XP?'var(--primary2)':'var(--muted)'}">${tasks.earn50XP?'✅':'⬜'}</span> Получить 50 XP <span style="float:right;font-size:11px;color:var(--muted)">${Math.min(dXP,50)}/50</span></div>`;
  html += `<div><span class="task-check${tasks.loginToday?' done':''}" style="color:${tasks.loginToday?'var(--primary2)':'var(--muted)'}">${tasks.loginToday?'✅':'⬜'}</span> Зайти сегодня</div></div></div>`;
  if (!allDone) {
    var nextIdx = all.findIndex((l,i)=>!userProgress.completedLessons[l.title]);
    if (nextIdx>=0) html += `<div class="continue-card" onclick="QuestionSystem.start(${nextIdx})"><div class="continue-icon">${all[nextIdx].title.match(/^\S+/)?.[0]||'▶️'}</div><div><div class="continue-label">Продолжить</div><div class="continue-title">${all[nextIdx].title}</div></div></div>`;
  } else {
    html += `<div class="continue-card" onclick="QuestionSystem.startBoss()" style="background:linear-gradient(135deg,#3a2a0c,#2a1f08);border-color:#d2992250"><div class="continue-icon">👑</div><div><div class="continue-label" style="color:#d29922">Финальный босс</div><div class="continue-title">Все темы</div></div></div>`;
  }
  c.innerHTML = html;
  document.getElementById('home-streak').textContent = '🔥 '+(userProgress.streak||0);
  document.getElementById('home-sublabel').textContent = `${doneCount}/${all.length} тем`;
  setTimeout(()=>c.querySelectorAll('.path-progress-fill[data-target]').forEach(f=>f.style.width=f.dataset.target), 50);
  animateCards(c);
}

function renderProfile() {
  var all = getAllLessons(), done = Object.keys(userProgress.completedLessons).length;
  var acc = userProgress.totalAnswered?Math.round(userProgress.totalCorrect/userProgress.totalAnswered*100):0;
  var grade = getPredictedGrade(), rank = getRank(userProgress.xp), chests = (userProgress.chests||[]).length;
  var html = `<div class="profile-header-card"><div class="profile-avatar-big">🧑‍🎓</div><div><div class="profile-name-big">Ученик <span style="background:var(--primary);padding:2px 8px;border-radius:10px;font-size:12px">${rank}</span></div><div class="profile-level-big">⚡ Ур.${userProgress.level} · ${userProgress.xp} XP</div></div></div>`;
  html += `<div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px"><div style="font-size:32px">🎯</div><div><div style="font-weight:700;">Прогноз ОГЭ</div><div style="color:var(--muted);">Оценка <span style="color:var(--gold);font-weight:800">${grade}</span></div></div></div>`;
  html += `<div class="profile-stats-grid"><div class="profile-stat"><div class="profile-stat-num">${done}/${all.length}</div><div class="profile-stat-label">Тем</div></div><div class="profile-stat"><div class="profile-stat-num">${acc}%</div><div class="profile-stat-label">Точность</div></div><div class="profile-stat"><div class="profile-stat-num">🔥 ${userProgress.streak||0}</div><div class="profile-stat-label">Дней</div></div></div>`;
  html += `<div style="background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin:12px 0;display:flex;justify-content:space-between;align-items:center;${chests>0?'animation:chestGlow 2s infinite,chestPulse 1.5s infinite':''}"><div><div style="font-weight:700;">🎁 Сундуки</div><div style="font-size:12px;color:var(--muted);">${chests>0?chests+' шт.':'Нет сундуков'}</div></div><button onclick="ChestSystem.open()" style="background:var(--gold);color:#000;border:none;border-radius:12px;padding:8px 16px;font-weight:700;cursor:pointer;${chests===0?'opacity:0.5;background:gray;color:#fff;':''}" ${chests===0?'disabled':''}>Открыть</button></div>`;
  document.getElementById('profile-content').innerHTML = html;
  animateCards(document.getElementById('profile-content'));
}
function inviteFriend() {}
function shareBossResult() {}

var userProgress = {
  xp:0, level:1, streak:0, lastDate:'', completedLessons:{}, totalAnswered:0, totalCorrect:0,
  bossCompleted:false, freezes:1, lastFreezeMonday:'', chests:[], invitedFriend:false,
  dailyTasksDate:'', dailyTasks:{solve10:false,earn50XP:false,loginToday:false},
  dailyTasksCollected:{solve10:false,earn50XP:false,loginToday:false},
  allDailyTasksDone:false, dailyQuestions:0, dailyXP:0, achievements:{},
  lastDailyChestDate:'', streakChestsGiven:{}, doubleXPUntil:null, professorGreetingDate:''
};
function saveProgress() { var d=JSON.stringify(userProgress); if (isTelegram) tgApp.CloudStorage.setItem('progress',d,()=>{}); else try{localStorage.setItem('geo_progress',d)}catch(e){} }
function loadProgress(cb) {
  if (isTelegram) tgApp.CloudStorage.getItem('progress',(err,val)=>{ if(!err&&val) try{userProgress=JSON.parse(val)}catch(e){} refreshFreeze(); cb(); });
  else { try{var s=localStorage.getItem('geo_progress'); if(s) userProgress=JSON.parse(s)}catch(e){} refreshFreeze(); cb(); }
}
function refreshFreeze() {
  var d=new Date(); d.setHours(0,0,0,0); var day=d.getDay(); var mon=new Date(d.setDate(d.getDate()-((day+6)%7))).toISOString().slice(0,10);
  if (!userProgress.lastFreezeMonday||userProgress.lastFreezeMonday<mon) { userProgress.freezes=1; userProgress.lastFreezeMonday=mon; saveProgress(); }
}
function checkStreak() {
  var today=new Date().toISOString().slice(0,10);
  if (userProgress.lastDate===today) return;
  var yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (userProgress.lastDate===yesterday) userProgress.streak++;
  else if (userProgress.lastDate!==today) { if (userProgress.freezes>0) { userProgress.freezes=0; userProgress.streak++; } else userProgress.streak=1; }
  userProgress.lastDate=today; saveProgress();
  AchievementSystem.check(); ChestSystem.giveDaily(); ChestSystem.giveStreak();
}
function getDayWord(n) { return n%10===1&&n%100!==11?'день':[2,3,4].includes(n%10)&&![12,13,14].includes(n%100)?'дня':'дней'; }

loadProgress(()=>{ checkStreak(); renderHomePath(); DailyQuestSystem.update(); AchievementSystem.check(); });
</script>
